<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Skärmtid</title>
    <style>
        :root {
            --ios-spring: cubic-bezier(0.2, 0.8, 0.2, 1);
            --ios-spring-elastic: cubic-bezier(0.175, 0.885, 0.32, 1.2);
        }

        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #1a1a1c; overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif; 
        }
        
        .page { 
            width: 100%; height: 100%; display: none; 
            flex-direction: column; align-items: center; 
            position: absolute; top: 0; left: 0; 
        }
        .page.active { display: flex; }

        /* ==================== TIDVÄLJAR-SIDA (mer äkta iOS) ==================== */
        #time-page { 
            background: #000; 
            position: relative; 
        }
        
        .time-selection-image { 
            width: 100%; height: 100%; object-fit: cover; 
            position: absolute; top: 0; left: 0; z-index: 1; 
            filter: brightness(0.85); /* Lite mörkare för att menyn ska poppa */
        }

        .menu-container {
            position: absolute;
            bottom: 0;
            width: 100%;
            max-width: 420px; /* realistisk maxbredd på iPhone */
            background: rgba(30, 30, 35, 0.75);
            backdrop-filter: blur(60px) saturate(180%) contrast(85%);
            -webkit-backdrop-filter: blur(60px) saturate(180%) contrast(85%);
            border-radius: 38px 38px 0 0;
            padding: 12px 16px 40px;
            box-sizing: border-box;
            z-index: 10;
            box-shadow: 
                0 -20px 40px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.25);
            animation: springUp 0.65s var(--ios-spring-elastic) forwards;
        }

        /* Grabber (den lilla pillen högst upp) */
        .grabber {
            width: 36px;
            height: 5px;
            background: rgba(255,255,255,0.45);
            border-radius: 10px;
            margin: 0 auto 24px;
        }

        .menu-title {
            text-align: center;
            font-size: 17px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 20px;
            letter-spacing: -0.3px;
        }

        .system-button {
            width: 100%;
            height: 58px;
            margin-bottom: 8px;
            border-radius: 14px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 17px;
            font-weight: 500;
            letter-spacing: -0.4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.25s var(--ios-spring);
            position: relative;
            overflow: hidden;
        }

        .system-button:last-child {
            margin-bottom: 0;
            background: rgba(255, 255, 255, 0.08);
            color: #ff3b30;
            font-weight: 600;
        }

        .system-button:active {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(0.98);
        }

        /* Liquid touch-effekt */
        .system-button.drag-active {
            background: rgba(255, 255, 255, 0.28) !important;
            transform: scale(1.02);
        }

        @keyframes springUp { 
            0% { transform: translateY(80px) scale(0.96); opacity: 0; } 
            100% { transform: translateY(0) scale(1); opacity: 1; } 
        }
    </style>
</head>
<body ontouchstart="">

    <!-- Login page (oförändrad) -->
    <div id="login-page" class="page active">
        <div class="pincode-section" style="margin-top: 25vh; text-align: center; width: 100%;">
            <div class="section-title">Ange lösenkod för Skärmtid</div>
            <div class="dots-container" style="display: flex; justify-content: center; gap: 25px; margin-bottom: 50px;">
                <div class="dot" style="width: 16px; height: 16px; border: 1px solid white; border-radius: 50%;"></div>
                <div class="dot" style="width: 16px; height: 16px; border: 1px solid white; border-radius: 50%;"></div>
                <div class="dot" style="width: 16px; height: 16px; border: 1px solid white; border-radius: 50%;"></div>
                <div class="dot" style="width: 16px; height: 16px; border: 1px solid white; border-radius: 50%;"></div>
            </div>
            <div class="error-pill" style="background:#ff3b30; color:white; padding:8px 20px; border-radius:50px; font-size:14px; display:inline-block;">
                1 misslyckat lösenkodsförsök
            </div>
        </div>
    </div>

    <!-- Tidväljarsida - NY & MER ÄKTA -->
    <div id="time-page" class="page">
        <img src="ios2.png" class="time-selection-image" alt="Välj tid">
        
        <div class="menu-container" id="ios-menu">
            <div class="grabber"></div>
            <div class="menu-title">Godkänn användning av YouTube</div>
            
            <button class="system-button" onclick="goToYouTubePage()">Godkänn i 15 minuter</button>
            <button class="system-button" onclick="goToYouTubePage()">Godkänn i 1 timme</button>
            <button class="system-button" onclick="goToYouTubePage()">Godkänn hela dagen</button>
            <button class="system-button" onclick="resetToLogin()">Avbryt</button>
        </div>
    </div>

    <!-- Resten av din kod (fake-youtube osv.) behålls oförändrad -->
    <div id="fake-youtube" class="page">
        <img src="4.jpeg" alt="YouTube" style="width:100%; height:100%; object-fit:cover;">
    </div>

    <h2 id="revealed-code"></h2>
    <input type="tel" id="hidden-input" maxlength="4" style="position:absolute; opacity:0;">

    <script>
        // Din befintliga script-kod (oförändrad utom touch-delen som behålls)
        const input = document.getElementById("hidden-input");
        const dots = document.querySelectorAll(".dot");
        const revealedCode = document.getElementById("revealed-code");

        // ... (din befintliga input-logik, goToYouTubePage, resetToLogin osv.)

        // Touch-effekter för liquid-känsla (förbättrad)
        const iosMenu = document.getElementById('ios-menu');
        const menuButtons = document.querySelectorAll('.system-button');

        function getButtonAtTouch(touch) {
            let target = document.elementFromPoint(touch.clientX, touch.clientY);
            return target ? target.closest('.system-button') : null;
        }

        iosMenu.addEventListener('touchstart', (e) => {
            iosMenu.classList.add('menu-drag-active');
            const activeBtn = getButtonAtTouch(e.touches[0]);
            menuButtons.forEach(btn => btn.classList.toggle('drag-active', btn === activeBtn));
        }, { passive: true });

        iosMenu.addEventListener('touchmove', (e) => {
            if (e.cancelable) e.preventDefault();
            const activeBtn = getButtonAtTouch(e.touches[0]);
            menuButtons.forEach(btn => btn.classList.toggle('drag-active', btn === activeBtn));
        }, { passive: false });

        iosMenu.addEventListener('touchend', (e) => {
            iosMenu.classList.remove('menu-drag-active');
            menuButtons.forEach(btn => btn.classList.remove('drag-active'));
            
            const activeBtn = getButtonAtTouch(e.changedTouches[0]);
            if (activeBtn) activeBtn.click();
        });
    </script>
</body>
</html>
