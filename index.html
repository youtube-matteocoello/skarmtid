<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Skärmtid</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        .page { width: 100%; height: 100%; display: none; position: absolute; top: 0; left: 0; }
        .page.active { display: flex; flex-direction: column; align-items: center; justify-content: center; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 1. Inloggning */
        .pincode-section { text-align: center; width: 100%; }
        .section-title { font-size: 20px; font-weight: 600; color: white; margin-bottom: 45px; }
        .dots-container { display: flex; justify-content: center; gap: 25px; margin-bottom: 50px; }
        .dot { width: 16px; height: 16px; border: 1px solid white; border-radius: 50%; transition: 0.2s; }
        .dot.active { background-color: white; transform: scale(1.15); }
        .error-pill { background-color: #ff3b30; color: white; padding: 8px 20px; border-radius: 50px; font-size: 14px; }

        /* 2. Tidväljare */
        #time-page { background: #000; position: relative; }
        .bg-image { width: 100%; height: 100%; object-fit: contain; }
        
        /* KNAPP-CONTAINER - Justera 'top' om de behöver flyttas */
        .btn-container {
            position: absolute;
            top: 29%; 
            left: 10%;
            width: 80%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
        }

        .btn-overlay {
            height: 60px;
            width: 100%;
            background: transparent;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        /* Växer vid tryck */
        .btn-overlay:active {
            transform: scale(1.03);
        }

        /* 3. YouTube-sida */
        #fake-youtube { background: #000; }
        #fake-youtube img { width: 100%; height: 100%; object-fit: cover; }
        #revealed-code { 
            color: #ff3b30; position: absolute; bottom: 50px; font-size: 20px; font-weight: bold;
            opacity: 0; transition: opacity 1s; pointer-events: none;
        }
        #revealed-code.show { opacity: 1; }
        
        #hidden-input { position: absolute; opacity: 0; top: -100px; }
    </style>
</head>
<body>

    <div id="login-page" class="page active">
        <div class="pincode-section">
            <div class="section-title">Ange lösenkod för Skärmtid</div>
            <div class="dots-container">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <div class="error-pill">1 misslyckat lösenkodsförsök</div>
        </div>
    </div>

    <div id="time-page" class="page">
        <img src="3.jpg" class="bg-image">
        <div class="btn-container">
            <div class="btn-overlay" onclick="goToYouTubePage()" ontouchstart=""></div>
            <div class="btn-overlay" onclick="goToYouTubePage()" ontouchstart=""></div>
            <div class="btn-overlay" onclick="goToYouTubePage()" ontouchstart=""></div>
            <div class="btn-overlay" onclick="goToYouTubePage()" ontouchstart=""></div>
        </div>
    </div>

    <div id="fake-youtube" class="page">
        <img src="4.jpeg">
        <h2 id="revealed-code"></h2>
    </div>

    <input type="tel" id="hidden-input" maxlength="4">

    <script>
        const input = document.getElementById("hidden-input");
        const dots = document.querySelectorAll(".dot");
        const revealedCode = document.getElementById("revealed-code");

        input.focus();
        document.body.addEventListener('click', () => input.focus());

        input.addEventListener("input", () => {
            let len = input.value.length;
            dots.forEach((dot, index) => dot.classList.toggle("active", index < len));
            if(len === 4) {
                setTimeout(() => {
                    document.getElementById("login-page").classList.remove("active");
                    document.getElementById("time-page").classList.add("active");
                }, 200);
            }
        });

        function goToYouTubePage() {
            document.getElementById("time-page").classList.remove("active");
            document.getElementById("fake-youtube").classList.add("active");
            setTimeout(() => {
                revealedCode.innerText = "Koden var: " + input.value;
                revealedCode.classList.add("show");
            }, 10000);
        }
    </script>
</body>
</html>
