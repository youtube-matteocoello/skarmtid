<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a1c">
    
    <title>Skärmtid</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; height: 100dvh; 
            overflow: hidden; background: #000; font-family: -apple-system, sans-serif; 
        }
        
        .page { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .active { display: flex; }

        #page-login { background: #1a1a1c; z-index: 10; }
        
        /* FIXEN: Cover och top center fixar proportionerna */
        #page-menu { 
            background: url('CcAjd.jpg') no-repeat top center; 
            background-size: cover; 
            background-color: #000; /* Fyller ut med svart om bilden tar slut i botten */
            z-index: 20; transform: translateX(100%); 
        }
        
        #page-youtube { background: #000; z-index: 30; transform: translateX(100%); overflow-y: auto; }

        .slide-in { transform: translateX(0) !important; }
        .slide-out { transform: translateX(-100%) !important; }

        .hitbox { 
            position: absolute; 
            width: 85%; 
            height: 70px; 
            cursor: pointer; 
            z-index: 40; 
            background: rgba(255,255,255,0.01);
        }

        .dots { display: flex; gap: 20px; margin-bottom: 20px; }
        .dot { width: 16px; height: 16px; border: 1px solid white; border-radius: 50%; }
        .dot.active { background: white; }
    </style>
</head>
<body>

    <div id="page-login" class="page active" onclick="document.getElementById('hidden-input').focus()">
        <h2 style="color:white">Ange lösenkod för Skärmtid</h2>
        <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>

    <div id="page-menu" class="page">
        <div class="hitbox" style="top: 310px;" onclick="goToYouTube()"></div>
        <div class="hitbox" style="top: 385px;" onclick="goToYouTube()"></div>
        <div class="hitbox" style="top: 460px;" onclick="goToYouTube()"></div>
        <div class="hitbox" style="top: 535px;" onclick="location.reload()"></div>
    </div>

    <div id="page-youtube" class="page">
        <img src="nya.jpeg" style="width: 100%; display: block;">
    </div>

    <input type="tel" id="hidden-input" maxlength="4" autocomplete="off" style="position:absolute; opacity:0; pointer-events:none;">

    <script>
        const input = document.getElementById("hidden-input");
        const dots = document.querySelectorAll(".dot");
        
        input.focus();

        input.addEventListener("input", () => {
            dots.forEach((dot, i) => dot.classList.toggle("active", i < input.value.length));
            if(input.value.length === 4) {
                input.blur(); 
                document.getElementById('page-login').classList.add('slide-out');
                document.getElementById('page-menu').classList.add('active', 'slide-in');
            }
        });

        function goToYouTube() {
            input.blur(); 
            document.getElementById('page-menu').classList.add('slide-out');
            document.getElementById('page-youtube').classList.add('active', 'slide-in');
        }
    </script>
</body>
</html>
