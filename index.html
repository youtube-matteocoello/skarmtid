<!DOCTYPE html>

<html lang="sv">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <title>Skärmtid</title>

    <style>

        /* DEFINIERAR REUSABLE IOS SPRING-FYSIK */

        :root {

            --ios-spring: cubic-bezier(0.2, 0.8, 0.2, 1);

            --ios-spring-elastic: cubic-bezier(0.175, 0.885, 0.32, 1.2);

        }



        html, body { 

            margin: 0; padding: 0; width: 100%; height: 100%; background-color: #1a1a1c; overflow: hidden; 

            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif; 

        }

        

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Hyper-smidig iOS-fjäderanimation för sidans inflygning */

        @keyframes springUp { 

            0% { transform: translateY(45px) scale(0.97); opacity: 0; } 

            100% { transform: translateY(0) scale(1); opacity: 1; } 

        }



        .page { width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; position: absolute; top: 0; left: 0; }

        .page.active { display: flex; animation: fadeIn 0.4s ease-out; }



        /* 1. Inloggningsskärm */

        .pincode-section { margin-top: 25vh; text-align: center; width: 100%; }

        .section-title { font-size: 20px; font-weight: 600; color: white; margin-bottom: 45px; letter-spacing: 0.5px; }

        .dots-container { display: flex; justify-content: center; gap: 25px; margin-bottom: 50px; }

        

        /* Knappar och dots har nu Apples 'spring' transition */

        .dot { width: 16px; height: 16px; border: 1px solid white; border-radius: 50%; transition: all 0.3s var(--ios-spring); }

        .dot.active { background-color: white; transform: scale(1.15); }

        .error-pill { background-color: #ff3b30; color: white; padding: 8px 20px; border-radius: 50px; font-size: 14px; display: inline-block; }



        /* 2. Tidväljarsida */

        #time-page { background: #000; position: relative; display: none; justify-content: center; align-items: center; }

        #time-page.active { display: flex; }

        

        .time-selection-image { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; }

        

        /* HYPER-REALISTISK 3D LIQUID GLASS-MENY */

        .menu-container {

            position: absolute;

            top: 24.2%; 

            width: 82%;

            

            /* Transparent bas kombinerat med inre gradients för att simulera djup och ljusbrytning */

            background: linear-gradient(135deg, rgba(40, 40, 45, 0.45) 0%, rgba(20, 20, 25, 0.35) 100%), 

                        radial-gradient(circle at 10% 10%, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0) 70%); /* Ljus glare uppe till vänster */

                        

            border-radius: 38px;

            padding: 45px 16px; 

            box-sizing: border-box;

            z-index: 10;

            display: flex;

            flex-direction: column;

            gap: 18px;

            

            /* Tunnare och skarpare "slipad" vit glaskant */

            border: 0.5px solid rgba(255, 255, 255, 0.2);

            

            /* Trippel-skugga: Djup, Inre skarp vit kant, och Inre mörk skugga */

            box-shadow: 

                0 30px 70px rgba(0, 0, 0, 0.6),

                inset 0 1px 1px rgba(255, 255, 255, 0.35),

                inset 0 -1px 1px rgba(0, 0, 0, 0.3);

                

            /* Saturate(250%) & brightness(1.15) skapar den lysande vätskekänslan */

            backdrop-filter: blur(45px) saturate(250%) brightness(1.15) contrast(95%);

            -webkit-backdrop-filter: blur(45px) saturate(250%) brightness(1.15) contrast(95%);

            

            /* Infart med Apple-studs */

            animation: springUp 0.65s var(--ios-spring-elastic) forwards;

            

            /* Mjuk transition för att HILA rutan ska kunna växa steglöst när du trycker */

            transition: transform 0.4s var(--ios-spring-elastic), box-shadow 0.4s ease, background-color 0.4s ease;

            transform: scale(1);

        }

        

        /* När du sätter fingret på menyn (eller dess knappar) så lyfter hela glasytan */

        .menu-container.menu-drag-active {

            transform: scale(1.025) !important; /* Mjukt och steglöst lyft */

            box-shadow: 

                0 45px 90px rgba(0, 0, 0, 0.75), /* Kraftigare skugga när den lyfts */

                inset 0 1.5px 1.5px rgba(255, 255, 255, 0.5),

                inset 0 -1.5px 1.5px rgba(0, 0, 0, 0.25);

            transition: transform 0.1s linear, box-shadow 0.1s ease, background-color 0.1s ease;

        }

        

        .system-button {

            width: 100%;

            height: 60px;

            border-radius: 30px;

            border: none;

            outline: none;

            background-color: rgba(255, 255, 255, 0.08); 

            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);

            color: #ffffff;

            font-family: -apple-system, BlinkMacSystemFont, sans-serif;

            font-size: 18px;

            font-weight: 500;

            letter-spacing: -0.4px;

            display: flex;

            align-items: center;

            justify-content: center;

            cursor: pointer;

            -webkit-tap-highlight-color: transparent;

            user-select: none;

            

            /* 'Cubic-bezier' med studs-effekt när fingret tas bort */

            transition: transform 0.4s var(--ios-spring-elastic), background-color 0.3s ease, box-shadow 0.3s ease;

        }

        

        /* Knappen VÄXER STEGLÖST och exakt när fingret är över den. Transition sköts nu av JavaScript för att det ska bli "Liquid" */

        .system-button.drag-active {

            background-color: rgba(255, 255, 255, 0.22); 

            transform: scale(1.05); /* Skalar upp märkbart */

            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2), 0 5px 20px rgba(0, 0, 0, 0.2);

            

            /* Snabb transition in, när man trycker/drar över den */

            transition: transform 0.1s linear, background-color 0.1s ease, box-shadow 0.1s ease;

        }



        /* 3. YouTube-sida */

        #fake-youtube { background: #000; }

        #fake-youtube img { width: 100%; height: 100%; object-fit: cover; display: block; }

        

        #revealed-code { 

            color: #ff3b30; text-align: center; position: absolute; bottom: 50px; left: 0; right: 0; font-size: 20px; z-index: 999; margin: 0; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,1); pointer-events: none; opacity: 0; transition: opacity 1s ease-in-out; 

        }

        #revealed-code.show { opacity: 1; }

        

        #hidden-input { position: absolute; opacity: 0; font-size: 16px; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100px; height: 40px; pointer-events: none; }

    </style>

</head>

<body ontouchstart=""> 



    <div id="login-page" class="page active">

        <div class="pincode-section">

            <div class="section-title">Ange lösenkod för Skärmtid</div>

            <div class="dots-container">

                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>

            </div>

            <div class="error-pill">1 misslyckat lösenkodsförsök</div>

        </div>

    </div>



    <div id="time-page" class="page">

        <img src="ios2.png" class="time-selection-image" alt="Välj tid">

        

        <div class="menu-container" id="ios-menu">

            <button class="system-button" onclick="goToYouTubePage()">Godkänn i 15 minuter</button>

            <button class="system-button" onclick="goToYouTubePage()">Godkänn i en timme</button>

            <button class="system-button" onclick="goToYouTubePage()">Godkänn hela dagen</button>

            <button class="system-button" onclick="resetToLogin()">Avbryt</button>

        </div>

    </div>



    <div id="fake-youtube" class="page">

        <img src="4.jpeg" alt="YouTube">

    </div>



    <h2 id="revealed-code"></h2>



    <input type="tel" id="hidden-input" maxlength="4">



    <script>

        const input = document.getElementById("hidden-input");

        const dots = document.querySelectorAll(".dot");

        const revealedCode = document.getElementById("revealed-code");

        

        document.body.addEventListener('click', () => {

            if (document.getElementById("login-page").classList.contains("active")) {

                input.focus();

            }

        });



        input.focus();



        input.addEventListener("input", () => {

            let length = input.value.length;

            dots.forEach((dot, index) => dot.classList.toggle("active", index < length));

            

            if(length === 4) {

                input.disabled = true; 

                input.blur();

                setTimeout(() => {

                    document.getElementById("login-page").classList.remove("active");

                    document.getElementById("time-page").classList.add("active");

                }, 150); 

            }

        });



        function goToYouTubePage() {

            document.getElementById("time-page").classList.remove("active");

            document.getElementById("fake-youtube").classList.add("active");

            

            setTimeout(() => {

                revealedCode.innerText = "Koden du skrev in var: " + input.value;

                revealedCode.classList.add("show"); 

            }, 10000);

        }



        function resetToLogin() {

            input.value = "";

            input.disabled = false;

            revealedCode.innerText = "";

            revealedCode.classList.remove("show");

            dots.forEach(dot => dot.classList.remove("active"));

            document.getElementById("time-page").classList.remove("active");

            document.getElementById("fake-youtube").classList.remove("active");

            document.getElementById("login-page").classList.add("active");

            setTimeout(() => { input.focus(); }, 300);

        }



        /* --- AVANCERAD TOUCH-SPÅRNING FÖR "LIQUID GLASS" --- */

        const iosMenu = document.getElementById('ios-menu');

        const menuButtons = document.querySelectorAll('.system-button');



        // Funktion för att hitta knapp under fingret

        function getButtonAtTouch(touch) {

            let target = document.elementFromPoint(touch.clientX, touch.clientY);

            if (target) {

                return target.closest('.system-button');

            }

            return null;

        }



        // När du sätter fingret på menyn (eller dess knappar)

        iosMenu.addEventListener('touchstart', (e) => {

            // Hela glaset "lyfter" mjukt och steglöst

            iosMenu.classList.add('menu-drag-active'); 

            

            const touch = e.touches[0];

            const activeBtn = getButtonAtTouch(touch);

            

            menuButtons.forEach(btn => {

                if (btn === activeBtn) {

                    btn.classList.add('drag-active');

                } else {

                    btn.classList.remove('drag-active');

                }

            });

        }, { passive: true });



        // Spårar fingret när du drar det (aktiverar rätt knapp steglöst)

        iosMenu.addEventListener('touchmove', (e) => {

            if (e.cancelable) {

                e.preventDefault(); // Förhindrar Safari-skärmscroll

            }

            

            const touch = e.touches[0];

            const activeBtn = getButtonAtTouch(touch);



            // Menyn förblir upplyft och aktiv under dragningen

            iosMenu.classList.add('menu-drag-active');



            menuButtons.forEach(btn => {

                if (btn === activeBtn) {

                    btn.classList.add('drag-active');

                } else {

                    btn.classList.remove('drag-active');

                }

            });

        }, { passive: false });



        // När du släpper fingret

        iosMenu.addEventListener('touchend', (e) => {

            // Sänk ner hela menyn mjukt igen (med studseffekten från CSS-transition)

            iosMenu.classList.remove('menu-drag-active'); 

            

            const touch = e.changedTouches[0];

            const activeBtn = getButtonAtTouch(touch);



            // Återställ alla knappars storlekar

            menuButtons.forEach(btn => btn.classList.remove('drag-active'));



            // Aktivera knappen du faktiskt släppte på

            if (activeBtn) {

                e.preventDefault(); 

                activeBtn.click(); 

            }

        });



        // Säkerhetsåtgärd om touchen avbryts av iOS-systemet

        iosMenu.addEventListener('touchcancel', () => {

            iosMenu.classList.remove('menu-drag-active');

            menuButtons.forEach(btn => btn.classList.remove('drag-active'));

        });

    </script>

</body>

</html>
