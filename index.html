<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Skärmtid</title>
    <style>
        :root {
            /* Apples exakta spring-fysik för iOS 17/18+ */
            --spring-soft: cubic-bezier(0.28, 0.8, 0.2, 1);
            --spring-bouncy: cubic-bezier(0.175, 0.885, 0.32, 1.25);
            --spring-snappy: cubic-bezier(0.25, 1, 0.5, 1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #000; overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif; 
            /* Svart bakgrund för mjuka in-zoomningar */
        }

        /* --- NYA ÄKTA SIDÖVERGÅNGAR --- */
        .page { 
            width: 100%; height: 100%; 
            position: absolute; top: 0; left: 0; 
            display: flex; flex-direction: column; align-items: center; 
            
            /* Istället för display:none använder vi opacitet och skala för 120Hz-smoothness */
            opacity: 0; 
            visibility: hidden;
            pointer-events: none;
            transform: scale(0.92) translate3d(0,0,0);
            transition: opacity 0.5s var(--spring-soft), transform 0.6s var(--spring-soft), visibility 0.6s;
            will-change: transform, opacity;
        }
        
        .page.active { 
            opacity: 1; 
            visibility: visible;
            pointer-events: auto;
            transform: scale(1) translate3d(0,0,0); 
        }

        /* 1. Inloggningsskärm */
        #login-page { background-color: #1a1a1c; z-index: 5; }
        .pincode-section { margin-top: 25vh; text-align: center; width: 100%; }
        .section-title { font-size: 20px; font-weight: 600; color: white; margin-bottom: 45px; letter-spacing: 0.5px; }
        
        .dots-container { display: flex; justify-content: center; gap: 25px; margin-bottom: 50px; }
        .dot { 
            width: 16px; height: 16px; border: 1px solid white; border-radius: 50%; 
            transition: all 0.25s var(--spring-bouncy); 
        }
        .dot.active { 
            background-color: white; 
            transform: scale(1.3); /* Bättre pop-effekt */
            border-color: transparent;
        }
        
        .error-pill { background-color: #ff3b30; color: white; padding: 8px 20px; border-radius: 50px; font-size: 14px; display: inline-block; }

        /* 2. Tidväljarsida */
        #time-page { z-index: 3; }
        
        /* Bakgrunden skalar bakåt när menyn poppar upp (Depth effect) */
        .time-selection-image { 
            width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; 
            transition: transform 0.7s var(--spring-soft), filter 0.7s var(--spring-soft);
            will-change: transform, filter;
            transform: scale(1.05) translate3d(0,0,0); /* Startar lite inzoomad för parallax-effekt */
        }
        #time-page.menu-open .time-selection-image {
            transform: scale(0.96) translate3d(0,0,0);
            filter: brightness(0.65); /* Mörknar för att lägga fokus på menyn */
        }
        
        /* WRAPPERN animerar inflygningen (Spring up) */
        .menu-wrapper {
            position: absolute;
            top: 24.2%; 
            width: 82%;
            z-index: 10;
            opacity: 0;
            transform: translateY(60px) scale(0.9) translate3d(0,0,0);
            transition: transform 0.65s var(--spring-bouncy), opacity 0.4s ease-out;
            will-change: transform, opacity;
        }
        #time-page.menu-open .menu-wrapper {
            opacity: 1;
            transform: translateY(0) scale(1) translate3d(0,0,0);
        }
        
        /* 3D LIQUID GLASS (GPU-optimerad) */
        .menu-container {
            width: 100%;
            background: 
                radial-gradient(circle at 15% 15%, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0) 60%), 
                linear-gradient(135deg, rgba(40, 40, 45, 0.5) 0%, rgba(20, 20, 25, 0.4) 100%);
            border-radius: 38px;
            padding: 45px 16px; 
            display: flex; flex-direction: column; gap: 18px;
            
            border: 0.5px solid rgba(255, 255, 255, 0.25);
            box-shadow: 
                0 30px 60px rgba(0,0,0,0.4),
                inset 0 1px 2px rgba(255,255,255,0.4),
                inset 0 -1px 2px rgba(0,0,0,0.3);
                
            backdrop-filter: blur(45px) saturate(220%) brightness(1.2);
            -webkit-backdrop-filter: blur(45px) saturate(220%) brightness(1.2);
            
            /* Tvinga hårdvaruacceleration */
            transform: translate3d(0,0,0) scale(1);
            backface-visibility: hidden;
            
            /* touch-action: none är MAGIN som stoppar Safari från att lagga under fingret */
            touch-action: none;
            
            transition: transform 0.3s var(--spring-soft), box-shadow 0.3s ease, background 0.3s ease;
        }
        
        .menu-container.menu-drag-active {
            transform: translate3d(0,0,0) scale(1.035); 
            background: 
                radial-gradient(circle at 15% 15%, rgba(255, 255, 255, 0.25) 0%, rgba(255, 255, 255, 0) 60%), 
                linear-gradient(135deg, rgba(50, 50, 55, 0.55) 0%, rgba(30, 30, 35, 0.45) 100%);
            box-shadow: 
                0 45px 90px rgba(0,0,0,0.6), 
                inset 0 1.5px 2px rgba(255,255,255,0.5),
                inset 0 -1.5px 2px rgba(0,0,0,0.25);
            /* Blixtsnabb reaktion när du trycker */
            transition: transform 0.15s var(--spring-snappy), box-shadow 0.15s ease, background 0.15s ease;
        }
        
        .system-button {
            width: 100%; height: 60px; border-radius: 30px;
            border: none; outline: none;
            background-color: rgba(255, 255, 255, 0.06); 
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
            color: #ffffff; font-size: 18px; font-weight: 500; letter-spacing: -0.4px;
            display: flex; align-items: center; justify-content: center;
            
            transform: translate3d(0,0,0) scale(1);
            will-change: transform, background-color;
            transition: transform 0.4s var(--spring-bouncy), background-color 0.4s ease, box-shadow 0.4s ease;
        }
        
        .system-button.drag-active {
            background-color: rgba(255, 255, 255, 0.25); 
            transform: translate3d(0,0,0) scale(1.06); 
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.25), 0 8px 20px rgba(0,0,0,0.2);
            /* Snärtig in-animation när fingret dras över */
            transition: transform 0.1s linear, background-color 0.1s linear, box-shadow 0.1s linear;
        }

        /* 3. YouTube-sida */
        #fake-youtube { z-index: 10; background: #000; }
        #fake-youtube img { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        #revealed-code { 
            color: #ff3b30; text-align: center; position: absolute; bottom: 50px; left: 0; right: 0; font-size: 20px; z-index: 999; margin: 0; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,1); pointer-events: none; opacity: 0; transition: opacity 1s ease-in-out; 
        }
        #revealed-code.show { opacity: 1; }
        
        #hidden-input { position: absolute; opacity: 0; font-size: 16px; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 10px; height: 10px; pointer-events: none; }
    </style>
</head>
<body> 

    <div id="login-page" class="page active">
        <div class="pincode-section">
            <div class="section-title">Ange lösenkod för Skärmtid</div>
            <div class="dots-container">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <div class="error-pill">1 misslyckat lösenkodsförsök</div>
        </div>
    </div>

    <div id="time-page" class="page">
        <img src="ios2.png" class="time-selection-image" alt="Välj tid">
        
        <div class="menu-wrapper">
            <div class="menu-container" id="ios-menu">
                <button class="system-button" onclick="goToYouTubePage()">Godkänn i 15 minuter</button>
                <button class="system-button" onclick="goToYouTubePage()">Godkänn i en timme</button>
                <button class="system-button" onclick="goToYouTubePage()">Godkänn hela dagen</button>
                <button class="system-button" onclick="resetToLogin()">Avbryt</button>
            </div>
        </div>
    </div>

    <div id="fake-youtube" class="page">
        <img src="4.jpeg" alt="YouTube">
    </div>

    <h2 id="revealed-code"></h2>
    <input type="tel" id="hidden-input" maxlength="4" autocomplete="off">

    <script>
        const input = document.getElementById("hidden-input");
        const dots = document.querySelectorAll(".dot");
        const revealedCode = document.getElementById("revealed-code");
        
        const loginPage = document.getElementById("login-page");
        const timePage = document.getElementById("time-page");
        const youtubePage = document.getElementById("fake-youtube");

        // Håll fokus på input
        document.body.addEventListener('click', () => {
            if (loginPage.classList.contains("active")) input.focus();
        });
        input.focus();

        input.addEventListener("input", () => {
            let length = input.value.length;
            
            // Poppar prickarna en och en
            dots.forEach((dot, index) => {
                if (index < length) {
                    dot.classList.add("active");
                } else {
                    dot.classList.remove("active");
                }
            });
            
            if(length === 4) {
                input.disabled = true; 
                input.blur();
                
                // Mjuk "App-övergång" till menysidan
                setTimeout(() => {
                    loginPage.classList.remove("active");
                    timePage.classList.add("active");
                    
                    // Fördröj meny-inflygningen liiite för att skapa depth-effekten
                    setTimeout(() => {
                        timePage.classList.add("menu-open");
                    }, 150);
                }, 200); 
            }
        });

        function goToYouTubePage() {
            // Mjuk övergång till YouTube
            timePage.classList.remove("menu-open");
            timePage.classList.remove("active");
            youtubePage.classList.add("active");
            
            setTimeout(() => {
                revealedCode.innerText = "Koden du skrev in var: " + input.value;
                revealedCode.classList.add("show"); 
            }, 10000);
        }

        function resetToLogin() {
            // Mjuk återställning
            timePage.classList.remove("menu-open");
            timePage.classList.remove("active");
            youtubePage.classList.remove("active");
            
            setTimeout(() => {
                input.value = "";
                input.disabled = false;
                revealedCode.innerText = "";
                revealedCode.classList.remove("show");
                dots.forEach(dot => dot.classList.remove("active"));
                
                loginPage.classList.add("active");
                setTimeout(() => { input.focus(); }, 400);
            }, 300); // Vänta på sidanimationen innan vi återställer
        }

        /* --- 120Hz TOUCH TRACKING ENGINE --- */
        const iosMenu = document.getElementById('ios-menu');
        const menuButtons = Array.from(document.querySelectorAll('.system-button'));

        function getButtonAtTouch(touch) {
            let target = document.elementFromPoint(touch.clientX, touch.clientY);
            return target ? target.closest('.system-button') : null;
        }

        iosMenu.addEventListener('touchstart', (e) => {
            iosMenu.classList.add('menu-drag-active'); 
            const activeBtn = getButtonAtTouch(e.touches[0]);
            
            menuButtons.forEach(btn => {
                btn.classList.toggle('drag-active', btn === activeBtn);
            });
        }, { passive: true });

        // Touchmove är nu fri från Safari-lagg tack vare touch-action: none i CSS
        iosMenu.addEventListener('touchmove', (e) => {
            const activeBtn = getButtonAtTouch(e.touches[0]);
            
            menuButtons.forEach(btn => {
                // Vi byter bara klass om det behövs för att spara prestanda
                const isActive = btn === activeBtn;
                if (isActive && !btn.classList.contains('drag-active')) {
                    btn.classList.add('drag-active');
                } else if (!isActive && btn.classList.contains('drag-active')) {
                    btn.classList.remove('drag-active');
                }
            });
        }, { passive: false }); // Måste vara false för att förhindra oväntad scroll

        iosMenu.addEventListener('touchend', (e) => {
            iosMenu.classList.remove('menu-drag-active'); 
            const activeBtn = getButtonAtTouch(e.changedTouches[0]);

            menuButtons.forEach(btn => btn.classList.remove('drag-active'));

            if (activeBtn) {
                // Haptic feedback simulering genom fördröjning
                setTimeout(() => {
                    activeBtn.click(); 
                }, 50);
            }
        });

        iosMenu.addEventListener('touchcancel', () => {
            iosMenu.classList.remove('menu-drag-active');
            menuButtons.forEach(btn => btn.classList.remove('drag-active'));
        });
    </script>
</body>
</html>
