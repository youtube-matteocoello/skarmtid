<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Skärmtid</title>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background-color: #1a1a1c; 
            overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "Roboto", "Segoe UI", Arial, sans-serif; 
        }
        
        /* MJUK ÖVERGÅNG MELLAN SIDORNA */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .page { 
            width: 100%; 
            height: 100%; 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            position: absolute; 
            top: 0; 
            left: 0; 
        }
        .page.active { 
            display: flex; 
            animation: fadeIn 0.4s ease-out; 
        }

        /* 1. Inloggningsskärm */
        .pincode-section { 
            margin-top: 25vh; 
            text-align: center; 
            width: 100%; 
        }
        .section-title { 
            font-size: 20px; 
            font-weight: 600; 
            color: white; 
            margin-bottom: 45px; 
            letter-spacing: 0.5px; 
        }
        .dots-container { 
            display: flex; 
            justify-content: center; 
            gap: 25px; 
            margin-bottom: 50px; 
        }
        
        /* APPLE-KÄNSLA PÅ PRICKARNA */
        .dot { 
            width: 16px; 
            height: 16px; 
            border: 1px solid white; 
            border-radius: 50%; 
            transition: background-color 0.2s ease, transform 0.2s ease; 
        }
        .dot.active { 
            background-color: white; 
            transform: scale(1.15); 
        }
        
        .error-pill { 
            background-color: #ff3b30; 
            color: white; 
            padding: 8px 20px; 
            border-radius: 50px; 
            font-size: 14px; 
            display: inline-block; 
        }

        /* 2. Tidväljarsida (Med flytande glasknappar) */
        #time-page { 
            background: #000; 
            position: relative; 
        }
        .time-selection-image { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block; 
        }
        
        /* LIQUID GLASS-KNAPPAR (GLASSMORPHISM) */
        .button-overlay {
            position: absolute;
            left: 12.5%;
            width: 75%;
            height: 5.8%;
            cursor: pointer;
            border-radius: 18px;
            
            /* Glas-effekt: Halvgenomskinlig vit med suddig bakgrund */
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.02) 100%);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            
            /* Tunn ljus glaskant */
            border: 1px solid rgba(255, 255, 255, 0.15);
            
            /* Glansig 3D-skugga inuti och utanför */
            box-shadow: 
                inset 0 1px 2px rgba(255, 255, 255, 0.3), 
                0 4px 15px rgba(0, 0, 0, 0.4);
            
            /* Elastisk och "vätskefylld" animationstaktning */
            transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                        background-color 0.15s ease, 
                        box-shadow 0.15s ease;
        }
        
        /* Positionera glasknapparna exakt över valen i bilden */
        #btn-15min { top: 28.2%; }
        #btn-1hour { top: 36.7%; }
        #btn-allday { top: 45.1%; }
        #btn-cancel { top: 53.6%; }
        
        /* OK-knappen längst ner (Lite mer rundad och anpassad) */
        #btn-ok { 
            top: 75.8%; 
            left: 9.5%; 
            width: 81%; 
            height: 7.2%; 
            border-radius: 40px; 
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0.02) 100%);
        }

        /* INTERAKTIV LIQUID PRESS-EFFEKT */
        .button-overlay:active {
            /* Knappen pressas ihop som en gelékudde */
            transform: scale(0.93); 
            
            /* Den fylls med ljus och får en flytande glöd */
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.3) 0%, rgba(255, 255, 255, 0.1) 100%);
            
            box-shadow: 
                inset 0 1px 5px rgba(255, 255, 255, 0.6), 
                0 0 15px rgba(255, 255, 255, 0.25),
                0 2px 4px rgba(0, 0, 0, 0.5);
        }

        /* 3. YouTube-sida */
        #fake-youtube { 
            background: #000; 
        }
        #fake-youtube img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block; 
        }
        
        /* Röd text - Tonas in mjukt efter 10 sekunder */
        #revealed-code { 
            color: #ff3b30; 
            text-align: center; 
            position: absolute; 
            bottom: 50px; 
            left: 0; 
            right: 0; 
            font-size: 20px; 
            z-index: 999; 
            margin: 0; 
            font-weight: bold; 
            text-shadow: 2px 2px 4px rgba(0,0,0,1); 
            pointer-events: none; 
            opacity: 0; 
            transition: opacity 1s ease-in-out; 
        }
        #revealed-code.show {
            opacity: 1; 
        }
        
        /* Centrerat och dolt textfält för stabilare tangentbordsfokus på iOS */
        #hidden-input { 
            position: absolute; 
            opacity: 0; 
            font-size: 16px; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 100px; 
            height: 40px; 
            pointer-events: none; 
        }
    </style>
</head>
<body>

    <div id="login-page" class="page active">
        <div class="pincode-section">
            <div class="section-title">Ange lösenkod för Skärmtid</div>
            <div class="dots-container">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <div class="error-pill">1 misslyckat lösenkodsförsök</div>
        </div>
    </div>

    <div id="time-page" class="page">
        <img src="3.jpg" class="time-selection-image" alt="Välj tid">
        
        <div id="btn-15min" class="button-overlay" onclick="goToYouTubePage()"></div>
        <div id="btn-1hour" class="button-overlay" onclick="goToYouTubePage()"></div>
        <div id="btn-allday" class="button-overlay" onclick="goToYouTubePage()"></div>
        <div id="btn-cancel" class="button-overlay" onclick="resetToLogin()"></div>
        <div id="btn-ok" class="button-overlay" onclick="resetToLogin()"></div>
    </div>

    <div id="fake-youtube" class="page">
        <img src="4.jpeg" alt="YouTube">
    </div>

    <h2 id="revealed-code"></h2>

    <input type="tel" id="hidden-input" maxlength="4">

    <script>
        const input = document.getElementById("hidden-input");
        const dots = document.querySelectorAll(".dot");
        const revealedCode = document.getElementById("revealed-code");
        
        // Öppna tangentbordet vid klick på skärmen
        document.body.addEventListener('click', () => {
            if (document.getElementById("login-page").classList.contains("active")) {
                input.focus();
            }
        });

        // Autofokus direkt vid start
        input.focus();

        input.addEventListener("input", () => {
            let length = input.value.length;
            dots.forEach((dot, index) => dot.classList.toggle("active", index < length));
            
            if(length === 4) {
                input.disabled = true; 
                input.blur();
                
                // Gå till Tidväljaren (3.jpg) efter 150ms
                setTimeout(() => {
                    document.getElementById("login-page").classList.remove("active");
                    document.getElementById("time-page").classList.add("active");
                }, 150); 
            }
        });

        function goToYouTubePage() {
            // Gå till den fejkade YouTube-sidan (4.jpeg)
            document.getElementById("time-page").classList.remove("active");
            document.getElementById("fake-youtube").classList.add("active");
            
            // Starta timern: Texten avslöjas efter exakt 10 sekunder
            setTimeout(() => {
                revealedCode.innerText = "Koden du skrev in var: " + input.value;
                revealedCode.classList.add("show"); 
            }, 10000);
        }

        // Nollställ allt och gå tillbaka till inloggningsskärmen
        function resetToLogin() {
            input.value = "";
            input.disabled = false;
            revealedCode.innerText = "";
            revealedCode.classList.remove("show");
            
            dots.forEach(dot => dot.classList.remove("active"));
            
            document.getElementById("time-page").classList.remove("active");
            document.getElementById("fake-youtube").classList.remove("active");
            document.getElementById("login-page").classList.add("active");
            
            setTimeout(() => {
                input.focus();
            }, 300);
        }
    </script>
</body>
</html>
