<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>Skärmtid</title>
    <style>
        /* ── Reset & root ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-dark:         #1a1a1c;
            --white:           #ffffff;
            --key-bg:          rgba(255,255,255,0.15);
            --key-bg-active:   rgba(255,255,255,0.45);
            --dot-border:      rgba(255,255,255,0.6);
            --gray-sub:        rgba(255,255,255,0.45);
            --transition-dur:  0.38s;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: -apple-system, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* ── Pages ── */
        .page {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            will-change: transform;
            transition: transform var(--transition-dur) ease-in-out;
        }

        .page-hidden-right  { transform: translateX(100%); }
        .page-hidden-left   { transform: translateX(-100%); }
        .page-visible       { transform: translateX(0); }

        /* ── iOS Status Bar ── */
        .status-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 999;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px 0;
            pointer-events: none;
        }

        .status-time {
            color: var(--white);
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .status-icons {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-icons svg {
            fill: var(--white);
        }

        /* ── Lock Page ── */
        #page-lock {
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 44px;
        }

        /* Subtle radial gradient to fake blurred wallpaper depth */
        #page-lock::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 30%, rgba(60,60,80,0.55) 0%, rgba(26,26,28,0) 70%);
            pointer-events: none;
        }

        .lock-top {
            position: relative;
            z-index: 1;
            margin-top: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .lock-app-name {
            color: var(--gray-sub);
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 0.1px;
        }

        .lock-title {
            color: var(--white);
            font-size: 20px;
            font-weight: 400;
            letter-spacing: -0.2px;
        }

        /* ── Passcode Dots ── */
        .dots-row {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 28px;
        }

        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 1.5px solid var(--dot-border);
            background: transparent;
            transition: background 0.15s ease, transform 0.15s ease;
        }

        .dot.filled {
            background: var(--white);
            animation: dotPop 0.22s ease forwards;
        }

        @keyframes dotPop {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* ── Keypad ── */
        .keypad-wrap {
            position: absolute;
            z-index: 1;
            bottom: 0;
            left: 0; right: 0;
            padding-bottom: max(24px, env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 72px);
            grid-template-rows: repeat(4, 72px);
            gap: 12px;
        }

        .key {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: var(--key-bg);
            border: none;
            outline: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background 0.1s ease;
            -webkit-appearance: none;
            position: relative;
        }

        .key:active,
        .key.flash {
            background: var(--key-bg-active);
        }

        .key-num {
            color: var(--white);
            font-size: 28px;
            font-weight: 300;
            line-height: 1;
            letter-spacing: -0.5px;
        }

        .key-letters {
            color: rgba(255,255,255,0.65);
            font-size: 9px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-top: 2px;
            line-height: 1;
        }

        .key-blank {
            background: transparent;
            pointer-events: none;
            cursor: default;
        }

        .key-back {
            background: var(--key-bg);
        }

        .key-back .key-num {
            font-size: 22px;
            font-weight: 400;
        }

        /* ── X (Cancel) Button ── */
        .x-btn {
            position: fixed;
            top: 52px; right: 18px;
            z-index: 100;
            width: 32px; height: 32px;
            border-radius: 50%;
            background: rgba(255,255,255,0.18);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: none;
            outline: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-size: 14px;
            font-weight: 500;
            line-height: 1;
            transition: background 0.15s ease;
        }

        .x-btn:active { background: rgba(255,255,255,0.32); }

        /* ── Error shake animation ── */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            15%       { transform: translateX(-8px); }
            30%       { transform: translateX(8px); }
            45%       { transform: translateX(-6px); }
            60%       { transform: translateX(6px); }
            75%       { transform: translateX(-3px); }
            90%       { transform: translateX(3px); }
        }

        .shake { animation: shake 0.48s ease; }

        /* ── Menu Page ── */
        #page-menu {
            background: url("bakgrund.jpg") no-repeat center center;
            background-size: cover;
        }

        /* Hitbox buttons (invisible) */
        .hitbox {
            position: absolute;
            left: 0; right: 0;
            height: 8%;
            cursor: pointer;
            background: transparent;
            -webkit-tap-highlight-color: transparent;
        }

        /* ── YouTube Page ── */
        #page-youtube {
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #page-youtube img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

<!-- ══════════════════════════════════════
     iOS STATUS BAR (fixed, above all)
═══════════════════════════════════════ -->
<div class="status-bar" id="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
        <!-- Signal bars -->
        <svg width="17" height="12" viewBox="0 0 17 12">
            <rect x="0"  y="7" width="3" height="5" rx="0.6" opacity="1"/>
            <rect x="4"  y="5" width="3" height="7" rx="0.6" opacity="1"/>
            <rect x="8"  y="3" width="3" height="9" rx="0.6" opacity="1"/>
            <rect x="12" y="0" width="3" height="12" rx="0.6" opacity="1"/>
        </svg>
        <!-- WiFi -->
        <svg width="16" height="12" viewBox="0 0 16 12">
            <path d="M8 10a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3z"/>
            <path d="M8 7.5C9.6 7.5 11 8.1 12.1 9.1L13.5 7.7A7.5 7.5 0 0 0 2.5 7.7L3.9 9.1C5 8.1 6.4 7.5 8 7.5z"/>
            <path d="M8 4.5C10.5 4.5 12.7 5.5 14.3 7.1L15.7 5.7A9.9 9.9 0 0 0 .3 5.7L1.7 7.1C3.3 5.5 5.5 4.5 8 4.5z"/>
        </svg>
        <!-- Battery -->
        <svg width="25" height="12" viewBox="0 0 25 12">
            <rect x="0" y="1" width="22" height="10" rx="2" ry="2" stroke="white" stroke-width="1" fill="none"/>
            <rect x="1.5" y="2.5" width="18" height="7" rx="1.2" fill="white"/>
            <path d="M23 4.5 C24.2 4.5 24.2 7.5 23 7.5" stroke="white" stroke-width="1" fill="none" stroke-linecap="round"/>
        </svg>
    </div>
</div>

<!-- ══════════════════════════════════════
     PAGE 1: LOCK / PASSCODE
═══════════════════════════════════════ -->
<div class="page page-visible" id="page-lock">

    <!-- X cancel button -->
    <button class="x-btn" id="x-btn" onclick="resetLogin()" aria-label="Avbryt">✕</button>

    <!-- Header -->
    <div class="lock-top">
        <span class="lock-app-name">Skärmtid</span>
        <span class="lock-title">Ange lösenkod</span>
    </div>

    <!-- Dots -->
    <div class="dots-row" id="dots-row">
        <div class="dot" id="d0"></div>
        <div class="dot" id="d1"></div>
        <div class="dot" id="d2"></div>
        <div class="dot" id="d3"></div>
    </div>

    <!-- Numeric keypad -->
    <div class="keypad-wrap">
        <div class="keypad" id="keypad">
            <!-- Row 1 -->
            <button class="key" data-digit="1" onclick="pressKey(\'1\')">
                <span class="key-num">1</span>
                <span class="key-letters">&nbsp;</span>
            </button>
            <button class="key" data-digit="2" onclick="pressKey(\'2\')">
                <span class="key-num">2</span>
                <span class="key-letters">ABC</span>
            </button>
            <button class="key" data-digit="3" onclick="pressKey(\'3\')">
                <span class="key-num">3</span>
                <span class="key-letters">DEF</span>
            </button>
            <!-- Row 2 -->
            <button class="key" data-digit="4" onclick="pressKey(\'4\')">
                <span class="key-num">4</span>
                <span class="key-letters">GHI</span>
            </button>
            <button class="key" data-digit="5" onclick="pressKey(\'5\')">
                <span class="key-num">5</span>
                <span class="key-letters">JKL</span>
            </button>
            <button class="key" data-digit="6" onclick="pressKey(\'6\')">
                <span class="key-num">6</span>
                <span class="key-letters">MNO</span>
            </button>
            <!-- Row 3 -->
            <button class="key" data-digit="7" onclick="pressKey(\'7\')">
                <span class="key-num">7</span>
                <span class="key-letters">PQRS</span>
            </button>
            <button class="key" data-digit="8" onclick="pressKey(\'8\')">
                <span class="key-num">8</span>
                <span class="key-letters">TUV</span>
            </button>
            <button class="key" data-digit="9" onclick="pressKey(\'9\')">
                <span class="key-num">9</span>
                <span class="key-letters">WXYZ</span>
            </button>
            <!-- Row 4 -->
            <button class="key key-blank" aria-hidden="true"></button>
            <button class="key" data-digit="0" onclick="pressKey(\'0\')">
                <span class="key-num">0</span>
                <span class="key-letters">&nbsp;</span>
            </button>
            <button class="key key-back" id="key-back" onclick="pressBack()" aria-label="Radera">
                <span class="key-num">⌫</span>
            </button>
        </div>
    </div>

    <!-- Hidden input for desktop keyboard fallback -->
    <input type="tel" id="hidden-input" inputmode="numeric" maxlength="4"
        style="position:fixed;opacity:0;pointer-events:none;top:-100px;left:-100px;width:1px;height:1px;"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
</div>

<!-- ══════════════════════════════════════
     PAGE 2: MENU
═══════════════════════════════════════ -->
<div class="page page-hidden-right" id="page-menu">
    <div class="hitbox" style="top:30%;" onclick="goYoutube()"></div>
    <div class="hitbox" style="top:38%;" onclick="goYoutube()"></div>
    <div class="hitbox" style="top:46%;" onclick="goYoutube()"></div>
    <div class="hitbox" style="top:54%;" onclick="goYoutube()"></div>
</div>

<!-- ══════════════════════════════════════
     PAGE 3: YOUTUBE
═══════════════════════════════════════ -->
<div class="page page-hidden-right" id="page-youtube">
    <img src="nya.jpeg" alt="">
</div>

<script>
(function () {
    "use strict";

    // ── State ──────────────────────────────
    var pin = "";
    var locked = false; // prevent input during transitions

    // ── DOM refs ──────────────────────────
    var pageLock    = document.getElementById("page-lock");
    var pageMenu    = document.getElementById("page-menu");
    var pageYoutube = document.getElementById("page-youtube");
    var dotsRow     = document.getElementById("dots-row");
    var hiddenInput = document.getElementById("hidden-input");
    var statusBar   = document.getElementById("status-bar");

    // ── Clock ──────────────────────────────
    function updateClock() {
        var now = new Date();
        var h   = now.getHours();
        var m   = now.getMinutes();
        var str = h + ":" + (m < 10 ? "0" + m : m);
        document.querySelector(".status-time").textContent = str;
    }
    updateClock();
    setInterval(updateClock, 15000);

    // ── Dots ──────────────────────────────
    function renderDots() {
        for (var i = 0; i < 4; i++) {
            var d = document.getElementById("d" + i);
            if (i < pin.length) {
                d.classList.add("filled");
            } else {
                d.classList.remove("filled");
            }
        }
    }

    // ── Key press ─────────────────────────
    window.pressKey = function (digit) {
        if (locked || pin.length >= 4) return;
        pin += digit;
        renderDots();
        // sync hidden input for desktop fallback
        hiddenInput.value = pin;

        if (pin.length === 4) {
            locked = true;
            // Brief pause then slide to menu
            setTimeout(function () {
                slideTo(pageMenu);
            }, 320);
        }
    };

    // ── Backspace ─────────────────────────
    window.pressBack = function () {
        if (locked) return;
        if (pin.length > 0) {
            pin = pin.slice(0, -1);
            renderDots();
            hiddenInput.value = pin;
        }
    };

    // ── Reset ─────────────────────────────
    window.resetLogin = function () {
        pin = "";
        locked = false;
        renderDots();
        hiddenInput.value = "";
    };

    // ── Desktop keyboard fallback ─────────
    hiddenInput.addEventListener("input", function () {
        var val = hiddenInput.value.replace(/\\D/g, "").slice(0, 4);
        pin = val;
        hiddenInput.value = val;
        renderDots();
        if (pin.length === 4 && !locked) {
            locked = true;
            setTimeout(function () { slideTo(pageMenu); }, 320);
        }
    });

    document.addEventListener("keydown", function (e) {
        if (e.key >= "0" && e.key <= "9") {
            pressKey(e.key);
        } else if (e.key === "Backspace") {
            pressBack();
        }
    });

    // Focus hidden input on tap anywhere on lock page (desktop convenience)
    pageLock.addEventListener("click", function () {
        hiddenInput.focus();
    }, false);

    // ── Key flash feedback ─────────────────
    document.querySelectorAll(".key:not(.key-blank)").forEach(function (btn) {
        function flash() {
            btn.classList.add("flash");
            setTimeout(function () { btn.classList.remove("flash"); }, 120);
        }
        btn.addEventListener("touchstart", flash, { passive: true });
        btn.addEventListener("mousedown", flash);
    });

    // ── Page transitions ──────────────────
    function slideTo(targetPage) {
        // Determine direction: menu is always "right" of lock, youtube right of menu
        var pages = [pageLock, pageMenu, pageYoutube];
        var current = pages.find(function (p) {
            return p.classList.contains("page-visible");
        });
        if (!current || current === targetPage) return;

        var fromIdx = pages.indexOf(current);
        var toIdx   = pages.indexOf(targetPage);

        if (toIdx > fromIdx) {
            // Slide left (outgoing goes left, incoming comes from right)
            targetPage.classList.remove("page-hidden-right");
            targetPage.classList.add("page-visible");

            // Force reflow so transition fires
            targetPage.getBoundingClientRect();

            current.classList.remove("page-visible");
            current.classList.add("page-hidden-left");
        } else {
            // Slide right (outgoing goes right, incoming comes from left)
            targetPage.classList.remove("page-hidden-left");
            targetPage.classList.add("page-visible");

            targetPage.getBoundingClientRect();

            current.classList.remove("page-visible");
            current.classList.add("page-hidden-right");
        }

        // After transition completes
        setTimeout(function () {
            // Update status bar colour if on menu page
            if (targetPage === pageMenu || targetPage === pageYoutube) {
                statusBar.style.display = "none";
            } else {
                statusBar.style.display = "";
            }
            // Unlock input if we\'re back on lock
            if (targetPage === pageLock) {
                locked = false;
            }
        }, 400);
    }

    // ── YouTube nav ───────────────────────
    window.goYoutube = function () {
        slideTo(pageYoutube);
    };

    // Tap youtube page to go back to menu
    pageYoutube.addEventListener("click", function () {
        slideTo(pageMenu);
    });

    // Expose slideTo globally for hitboxes if needed
    window.slideTo = slideTo;

    // Focus input on load (desktop)
    try { hiddenInput.focus(); } catch(e) {}
}());
</script>
</body>
</html>'''

with open("./skarmtid.html", "w", encoding="utf-8") as f:
    f.write(html_content)
