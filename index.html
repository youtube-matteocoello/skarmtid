<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    
    <title>Skärmtid</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; }
        
        .page { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; transition: transform 0.4s ease-in-out;
        }

        /* Sida 1: Inloggning */
        #page-login { display: flex; flex-direction: column; align-items: center; justify-content: center; background: #1a1a1c; z-index: 10; }
        #page-login.active { display: flex; }

        /* Sida 2: Meny - Bilden täcker allt */
        #page-menu { 
            background: url('bakgrund.jpg') no-repeat center center; 
            background-size: cover; 
            z-index: 20; transform: translateX(100%); 
        }
        #page-menu.active { display: block; transform: translateX(0); }

        /* Sida 3: YouTube */
        #page-youtube { background: #000; z-index: 30; transform: translateX(100%); }
        #page-youtube.active { display: block; transform: translateX(0); }
        #page-youtube img { width: 100%; height: 100%; object-fit: contain; display: block; }

        /* Hitboxar */
        .hitbox { 
            position: absolute; left: 10%; width: 80%; height: 60px; 
            cursor: pointer; z-index: 40; 
        }
    </style>
</head>
<body>

    <div id="page-login" class="page active" onclick="document.getElementById('hidden-input').focus()">
        <h2 style="color:white">Ange lösenkod</h2>
    </div>

    <div id="page-menu" class="page">
        <div class="hitbox" style="top: 30%;" onclick="goToYouTube()"></div>
        <div class="hitbox" style="top: 38%;" onclick="goToYouTube()"></div>
        <div class="hitbox" style="top: 46%;" onclick="goToYouTube()"></div>
        <div class="hitbox" style="top: 54%;" onclick="location.reload()"></div>
    </div>

    <div id="page-youtube" class="page">
        <img src="nya.jpeg" alt="YouTube">
    </div>

    <input type="tel" id="hidden-input" maxlength="4" style="position:absolute; opacity:0; pointer-events:none;">

    <script>
        const input = document.getElementById("hidden-input");
        input.focus();

        input.addEventListener("input", () => {
            if(input.value.length === 4) {
                document.getElementById('page-login').style.display = 'none';
                document.getElementById('page-menu').classList.add('active');
            }
        });

        function goToYouTube() {
            document.getElementById('page-menu').classList.remove('active');
            document.getElementById('page-youtube').classList.add('active');
        }
    </script>
</body>
</html>
