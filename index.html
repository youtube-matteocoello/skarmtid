<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Skärmtid</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; }
        
        .page { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; transition: transform 0.4s ease-in-out;
        }

        /* Inloggningssida - "Pop-up" känsla */
        #page-login { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: #000; z-index: 10; display: flex; 
        }

        /* Apple Glass Header */
        .header-box {
            position: absolute; top: 0; width: 100%; height: 120px;
            background: rgba(28, 28, 30, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.1);
            display: flex; align-items: flex-end; justify-content: center;
            padding-bottom: 20px;
        }

        .x-button { 
            position: absolute; top: 50px; right: 20px; 
            width: 30px; height: 30px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 18px; cursor: pointer;
        }

        h2 { color: white; font-size: 1.2rem; font-weight: 600; }

        .dots { display: flex; gap: 15px; margin-top: 30px; }
        .dot { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; }
        .dot.active { background: white; }

        /* Meny (Bakgrund + Animering) */
        #page-menu { 
            background: url('bakgrund.jpg') no-repeat center center; 
            background-size: cover; 
            z-index: 20; transform: translateX(100%); 
        }
        #page-menu.active { display: block; transform: translateX(0); }

        /* YouTube */
        #page-youtube { background: #000; z-index: 30; transform: translateX(100%); }
        #page-youtube.active { display: block; transform: translateX(0); }
        #page-youtube img { width: 100%; height: 100%; object-fit: contain; }

        .slide-out { transform: translateX(-100%) !important; }

        /* Hitboxar */
        .hitbox { 
            position: absolute; left: 10%; width: 80%; height: 60px; 
            cursor: pointer; z-index: 40; 
        }
    </style>
</head>
<body>

    <div id="page-login" class="page active" onclick="document.getElementById('hidden-input').focus()">
        <div class="header-box">
            <h2>Skärmtid</h2>
            <div class="x-button" onclick="resetLogin(event)">✕</div>
        </div>
        <div class="dots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
    </div>

    <div id="page-menu" class="page">
        <div class="hitbox" style="top: 30%;" onclick="goToYouTube()"></div>
        <div class="hitbox" style="top: 38%;" onclick="goToYouTube()"></div>
        <div class="hitbox" style="top: 46%;" onclick="goToYouTube()"></div>
        <div class="hitbox" style="top: 54%;" onclick="location.reload()"></div>
    </div>

    <div id="page-youtube" class="page">
        <img src="nya.jpeg" alt="YouTube">
    </div>

    <input type="tel" id="hidden-input" maxlength="4" style="position:absolute; opacity:0; pointer-events:none;">

    <script>
        const input = document.getElementById("hidden-input");
        const dots = document.querySelectorAll(".dot");
        input.focus();

        function resetLogin(event) {
            event.stopPropagation();
            input.value = '';
            dots.forEach(dot => dot.classList.remove('active'));
        }

        input.addEventListener("input", () => {
            dots.forEach((dot, i) => dot.classList.toggle("active", i < input.value.length));
            if(input.value.length === 4) {
                document.getElementById('page-login').classList.add('slide-out');
                document.getElementById('page-menu').classList.add('active');
            }
        });

        function goToYouTube() {
            document.getElementById('page-menu').classList.add('slide-out');
            document.getElementById('page-youtube').classList.add('active');
        }
    </script>
</body>
</html>
