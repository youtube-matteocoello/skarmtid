<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Skärmtid</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #1a1a1c; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Roboto", "Segoe UI", Arial, sans-serif; }
        
        /* MJUKA ÖVERGÅNGAR MELLAN SIDOR */
        .page { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; position: absolute; top: 0; left: 0; opacity: 0; pointer-events: none; transition: opacity 0.4s ease-in-out; }
        .page.active { opacity: 1; pointer-events: auto; }

        /* 1. Inloggningsskärm */
        .pincode-section { margin-top: 25vh; text-align: center; width: 100%; }
        .section-title { font-size: 20px; font-weight: 600; color: white; margin-bottom: 45px; letter-spacing: 0.5px; }
        .dots-container { display: flex; justify-content: center; gap: 25px; margin-bottom: 50px; }
        
        /* MJUK EFFEKT PÅ PRICKARNA */
        .dot { width: 16px; height: 16px; border: 1px solid white; border-radius: 50%; transition: background-color 0.1s ease, transform 0.15s ease; }
        .dot.active { background-color: white; transform: scale(1.15); } /* Växer lite när den fylls i */
        
        .error-pill { background-color: #ff3b30; color: white; padding: 8px 20px; border-radius: 50px; font-size: 14px; display: inline-block; }

        /* 2. Tidväljarsida */
        #time-page { background: #000; cursor: pointer; }
        .time-selection-image { width: 100%; height: 100%; object-fit: cover; display: block; transition: opacity 0.2s ease; }
        
        /* KLICK-FEEDBACK (känns som en riktig knapp när man trycker) */
        #time-page:active .time-selection-image { opacity: 0.7; } 

        /* 3. YouTube-sida */
        #fake-youtube { background: #000; }
        #fake-youtube img { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        /* MJUK INTONING AV RÖD TEXT */
        #revealed-code { 
            color: #ff3b30; 
            text-align: center; 
            position: absolute; 
            bottom: 50px; 
            left: 0; 
            right: 0; 
            font-size: 20px; 
            z-index: 999; 
            margin: 0; 
            font-weight: bold; 
            text-shadow: 2px 2px 4px rgba(0,0,0,1); 
            pointer-events: none; 
            opacity: 0; /* Börjar osynlig */
            transition: opacity 1.5s ease; /* Tonar in snyggt */
        }
        #revealed-code.show { opacity: 1; } /* Klassen som läggs till för att visa texten */
        
        /* Gömt inmatningsfält som stoppar iOS-zoom */
        #hidden-input { position: absolute; opacity: 0; font-size: 16px; top: -100px; left: -100px; width: 1px; height: 1px; }
    </style>
</head>
<body>

    <div id="login-page" class="page active">
        <div class="pincode-section">
            <div class="section-title">Ange lösenkod för Skärmtid</div>
            <div class="dots-container">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <div class="error-pill">1 misslyckat lösenkodsförsök</div>
        </div>
    </div>

    <div id="time-page" class="page" onclick="goToYouTubePage()">
        <img src="3.jpg" class="time-selection-image" alt="Välj tid">
    </div>

    <div id="fake-youtube" class="page">
        <img src="4.jpeg">
    </div>

    <h2 id="revealed-code"></h2>

    <input type="tel" id="hidden-input" maxlength="4">

    <script>
        const input = document.getElementById("hidden-input");
        const dots = document.querySelectorAll(".dot");
        const revealedCode = document.getElementById("revealed-code");
        
        // Öppna bara tangentbordet om man faktiskt är på inloggningssidan
        document.body.addEventListener('click', () => {
            if (document.getElementById("login-page").classList.contains("active")) {
                input.focus();
            }
        });

        // Autofokus vid start
        input.focus();

        input.addEventListener("input", () => {
            let length = input.value.length;
            dots.forEach((dot, index) => dot.classList.toggle("active", index < length));
            
            if(length === 4) {
                // Stäng ner tangentbordet för gott
                input.disabled = true; 
                input.blur();
                
                // En liten fördröjning (0.2s) så att den fjärde pricken hinner fyllas i snyggt
                setTimeout(() => {
                    document.getElementById("login-page").classList.remove("active");
                    document.getElementById("time-page").classList.add("active");
                }, 250); 
            }
        });

        function goToYouTubePage() {
            // Gå till YouTube (4.jpeg)
            document.getElementById("time-page").classList.remove("active");
            document.getElementById("fake-youtube").classList.add("active");
            
            // Starta timern på 10 sekunder
            setTimeout(() => {
                revealedCode.innerText = "Koden du skrev in var: " + input.value;
                revealedCode.classList.add("show"); // Tonar in texten!
            }, 10000);
        }
    </script>
</body>
</html>
