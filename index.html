<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Skärmtid</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        
        .page { width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; position: absolute; }
        .page.active { display: flex; }

        /* Modern Liquid Glass Menu */
        .menu-container {
            position: absolute;
            top: 25%;
            width: 85%;
            padding: 20px;
            /* Liquid Glass-gradient */
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.25), rgba(255, 255, 255, 0.05));
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.2);
            display: flex; flex-direction: column; gap: 10px;
        }

        .system-button {
            width: 100%; height: 65px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: white; font-size: 18px; font-weight: 500;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s ease;
        }
        .system-button.drag-active {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(0.98);
        }

        /* Övrig estetik */
        .dot { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; transition: 0.3s; }
        .dot.active { background: white; border-color: white; }
        #hidden-input { opacity: 0; position: absolute; }
    </style>
</head>
<body>
    <div id="login-page" class="page active">
        <div style="margin-top: 25vh; color: white;">Ange lösenkod</div>
        <div style="display:flex; gap:20px; margin-top:20px;">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
    </div>

    <div id="time-page" class="page">
        <div class="menu-container" id="ios-menu">
            <button class="system-button" onclick="goToYouTubePage()">15 minuter</button>
            <button class="system-button" onclick="goToYouTubePage()">En timme</button>
            <button class="system-button" onclick="resetToLogin()">Avbryt</button>
        </div>
    </div>

    <div id="fake-youtube" class="page" onclick="resetToLogin()">
        <img src="4.jpeg" style="width:100%; height:100%; object-fit:cover;">
    </div>

    <input type="tel" id="hidden-input" maxlength="4">

    <script>
        const input = document.getElementById("hidden-input");
        const dots = document.querySelectorAll(".dot");
        const iosMenu = document.getElementById('ios-menu');
        const menuButtons = document.querySelectorAll('.system-button');

        input.addEventListener("input", () => {
            dots.forEach((dot, i) => dot.classList.toggle("active", i < input.value.length));
            if(input.value.length === 4) {
                document.getElementById("login-page").classList.remove("active");
                document.getElementById("time-page").classList.add("active");
            }
        });

        // Touch-logik för Liquid känsla
        iosMenu.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            const target = document.elementFromPoint(touch.clientX, touch.clientY)?.closest('.system-button');
            menuButtons.forEach(btn => btn.classList.toggle('drag-active', btn === target));
        });

        iosMenu.addEventListener('touchend', () => {
            menuButtons.forEach(btn => btn.classList.remove('drag-active'));
        });

        function goToYouTubePage() {
            document.getElementById("time-page").classList.remove("active");
            document.getElementById("fake-youtube").classList.add("active");
        }

        function resetToLogin() {
            input.value = "";
            dots.forEach(d => d.classList.remove("active"));
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById("login-page").classList.add('active');
            input.focus();
        }
        document.body.addEventListener('click', () => input.focus());
    </script>
</body>
</html>
