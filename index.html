<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Skärmtid</title>
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; background-color: #1a1a1c; overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif; 
        }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        @keyframes springUp { 
            0% { transform: translateY(35px) scale(0.98); opacity: 0; } 
            100% { transform: translateY(0) scale(1); opacity: 1; } 
        }

        .page { width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; position: absolute; top: 0; left: 0; }
        .page.active { display: flex; animation: fadeIn 0.4s ease-out; }

        /* 1. Inloggningsskärm */
        .pincode-section { margin-top: 25vh; text-align: center; width: 100%; }
        .section-title { font-size: 20px; font-weight: 600; color: white; margin-bottom: 45px; letter-spacing: 0.5px; }
        .dots-container { display: flex; justify-content: center; gap: 25px; margin-bottom: 50px; }
        .dot { width: 16px; height: 16px; border: 1px solid white; border-radius: 50%; transition: background-color 0.2s ease, transform 0.2s ease; }
        .dot.active { background-color: white; transform: scale(1.15); }
        .error-pill { background-color: #ff3b30; color: white; padding: 8px 20px; border-radius: 50px; font-size: 14px; display: inline-block; }

        /* 2. Tidväljarsida */
        #time-page { background: #000; position: relative; display: none; justify-content: center; align-items: center; }
        #time-page.active { display: flex; }
        
        .time-selection-image { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* 3D LIQUID GLASS-MENYN */
        .menu-container {
            position: absolute;
            top: 24.2%; 
            width: 82%;
            background: linear-gradient(135deg, rgba(40, 40, 45, 0.45) 0%, rgba(20, 20, 25, 0.35) 100%);
            border-radius: 38px;
            padding: 45px 16px; 
            box-sizing: border-box;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 18px;
            
            border: 0.5px solid rgba(255, 255, 255, 0.18);
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.6),
                inset 0 1px 1px rgba(255, 255, 255, 0.2),
                inset 0 -1px 1px rgba(0, 0, 0, 0.4);
                
            backdrop-filter: blur(45px) saturate(250%) brightness(1.1);
            -webkit-backdrop-filter: blur(45px) saturate(250%) brightness(1.1);
            
            animation: springUp 0.65s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            
            /* Lade till en mjuk övergång så att HILA rutan kan animeras */
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2), box-shadow 0.4s ease;
        }
        
        /* Denna klass appliceras på hela menyn när du rör/drar på den */
        .menu-container.menu-drag-active {
            transform: scale(1.02) !important; 
            box-shadow: 
                0 40px 80px rgba(0, 0, 0, 0.75), /* Kraftigare ytterskugga när den lyfts */
                inset 0 1px 1px rgba(255, 255, 255, 0.25),
                inset 0 -1px 1px rgba(0, 0, 0, 0.4);
        }
        
        .system-button {
            width: 100%;
            height: 60px;
            border-radius: 30px;
            border: none;
            outline: none;
            background-color: rgba(255, 255, 255, 0.08); 
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 18px;
            font-weight: 500;
            letter-spacing: -0.4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2), background-color 0.3s ease, box-shadow 0.3s ease;
        }
        
        .system-button:active, .system-button.drag-active {
            background-color: rgba(255, 255, 255, 0.2); 
            transform: scale(1.05); 
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.15), 0 4px 15px rgba(0, 0, 0, 0.15);
            
            transition: transform 0.15s cubic-bezier(0.2, 0, 0.2, 1), background-color 0.1s ease, box-shadow 0.1s ease;
        }

        /* 3. YouTube-sida */
        #fake-youtube { background: #000; }
        #fake-youtube img { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        #revealed-code { 
            color: #ff3b30; text-align: center; position: absolute; bottom: 50px; left: 0; right: 0; font-size: 20px; z-index: 999; margin: 0; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,1); pointer-events: none; opacity: 0; transition: opacity 1s ease-in-out; 
        }
        #revealed-code.show { opacity: 1; }
        
        #hidden-input { position: absolute; opacity: 0; font-size: 16px; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100px; height: 40px; pointer-events: none; }
    </style>
</head>
<body ontouchstart=""> 

    <div id="login-page" class="page active">
        <div class="pincode-section">
            <div class="section-title">Ange lösenkod för Skärmtid</div>
            <div class="dots-container">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <div class="error-pill">1 misslyckat lösenkodsförsök</div>
        </div>
    </div>

    <div id="time-page" class="page">
        <img src="ios2.png" class="time-selection-image" alt="Välj tid">
        
        <div class="menu-container" id="ios-menu">
            <button class="system-button" onclick="goToYouTubePage()">Godkänn i 15 minuter</button>
            <button class="system-button" onclick="goToYouTubePage()">Godkänn i en timme</button>
            <button class="system-button" onclick="goToYouTubePage()">Godkänn hela dagen</button>
            <button class="system-button" onclick="resetToLogin()">Avbryt</button>
        </div>
    </div>

    <div id="fake-youtube" class="page">
        <img src="4.jpeg" alt="YouTube">
    </div>

    <h2 id="revealed-code"></h2>

    <input type="tel" id="hidden-input" maxlength="4">

    <script>
        const input = document.getElementById("hidden-input");
        const dots = document.querySelectorAll(".dot");
        const revealedCode = document.getElementById("revealed-code");
        
        document.body.addEventListener('click', () => {
            if (document.getElementById("login-page").classList.contains("active")) {
                input.focus();
            }
        });

        input.focus();

        input.addEventListener("input", () => {
            let length = input.value.length;
            dots.forEach((dot, index) => dot.classList.toggle("active", index < length));
            
            if(length === 4) {
                input.disabled = true; 
                input.blur();
                setTimeout(() => {
                    document.getElementById("login-page").classList.remove("active");
                    document.getElementById("time-page").classList.add("active");
                }, 150); 
            }
        });

        function goToYouTubePage() {
            document.getElementById("time-page").classList.remove("active");
            document.getElementById("fake-youtube").classList.add("active");
            
            setTimeout(() => {
                revealedCode.innerText = "Koden du skrev in var: " + input.value;
                revealedCode.classList.add("show"); 
            }, 10000);
        }

        function resetToLogin() {
            input.value = "";
            input.disabled = false;
            revealedCode.innerText = "";
            revealedCode.classList.remove("show");
            dots.forEach(dot => dot.classList.remove("active"));
            document.getElementById("time-page").classList.remove("active");
            document.getElementById("fake-youtube").classList.remove("active");
            document.getElementById("login-page").classList.add("active");
            setTimeout(() => { input.focus(); }, 300);
        }

        const iosMenu = document.getElementById('ios-menu');
        const menuButtons = document.querySelectorAll('.system-button');

        // När du sätter fingret på menyn
        iosMenu.addEventListener('touchstart', (e) => {
            // Hela menyn "lyfter"
            iosMenu.classList.add('menu-drag-active'); 
            
            const touch = e.touches[0];
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            if (target && target.classList.contains('system-button')) {
                target.classList.add('drag-active');
            }
        }, { passive: true });

        // Spårar fingret när du drar det (aktiverar rätt knapp)
        iosMenu.addEventListener('touchmove', (e) => {
            e.preventDefault(); 
            const touch = e.touches[0];
            const target = document.elementFromPoint(touch.clientX, touch.clientY);

            menuButtons.forEach(btn => {
                if (btn === target) {
                    btn.classList.add('drag-active');
                } else {
                    btn.classList.remove('drag-active');
                }
            });
        }, { passive: false });

        // När du släpper fingret
        iosMenu.addEventListener('touchend', (e) => {
            // Återställ menyns "lyft"
            iosMenu.classList.remove('menu-drag-active'); 
            
            const touch = e.changedTouches[0];
            const target = document.elementFromPoint(touch.clientX, touch.clientY);

            // Återställ alla knappar
            menuButtons.forEach(btn => btn.classList.remove('drag-active'));

            // Klicka på knappen du släppte fingret över
            if (target && target.classList.contains('system-button')) {
                e.preventDefault(); 
                target.click(); 
            }
        });

        // Säkerhetsåtgärd om fingret glider utanför skärmen eller avbryts av systemet
        iosMenu.addEventListener('touchcancel', () => {
            iosMenu.classList.remove('menu-drag-active');
            menuButtons.forEach(btn => btn.classList.remove('drag-active'));
        });
    </script>
</body>
</html>
