<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Skärmtid</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #1a1a1c; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Roboto", "Segoe UI", Arial, sans-serif; }
        
        .page { width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; position: absolute; top: 0; left: 0; }
        .page.active { display: flex; }

        /* Inloggningsskärm */
        .pincode-section { margin-top: 25vh; text-align: center; width: 100%; }
        .section-title { font-size: 20px; font-weight: 600; color: white; margin-bottom: 45px; letter-spacing: 0.5px; }
        .dots-container { display: flex; justify-content: center; gap: 25px; margin-bottom: 50px; }
        .dot { width: 16px; height: 16px; border: 1px solid white; border-radius: 50%; }
        .dot.active { background-color: white; }
        .error-pill { background-color: #ff3b30; color: white; padding: 8px 20px; border-radius: 50px; font-size: 14px; display: inline-block; }

        /* Sidor med bilder */
        #fake-youtube { background: #000; cursor: pointer; }
        #fake-youtube img { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        #time-page { background: #000; }
        .time-selection-image { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        /* Texten som visar koden */
        #revealed-code { color: #ff3b30; text-align: center; position: absolute; bottom: 40px; left: 0; right: 0; font-size: 18px; z-index: 10; margin: 0; font-weight: bold; text-shadow: 1px 1px 4px rgba(0,0,0,0.8); }
        
        /* Helt gömd input med 16px för att förhindra iOS-zoom vid start */
        #hidden-input { position: absolute; opacity: 0; font-size: 16px; top: -100px; left: -100px; width: 1px; height: 1px; }
    </style>
</head>
<body>

    <div id="login-page" class="page active">
        <div class="pincode-section">
            <div class="section-title">Ange lösenkod för Skärmtid</div>
            <div class="dots-container">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <div class="error-pill">1 misslyckat lösenkodsförsök</div>
        </div>
    </div>

    <div id="fake-youtube" class="page" onclick="goToTimePage()">
        <img src="4.jpeg">
        <h2 id="revealed-code"></h2>
    </div>

    <div id="time-page" class="page">
        <img src="3.jpg" class="time-selection-image" alt="Välj tid">
    </div>

    <input type="tel" id="hidden-input" maxlength="4">

    <script>
        const input = document.getElementById("hidden-input");
        const dots = document.querySelectorAll(".dot");
        const revealedCode = document.getElementById("revealed-code");
        
        // Klicka aktiverar BARA tangentbordet om man är kvar på login-sidan
        document.body.addEventListener('click', () => {
            if (document.getElementById("login-page").classList.contains("active")) {
                input.focus();
            }
        });

        // Starta med fokus på inloggningen
        input.focus();

        input.addEventListener("input", () => {
            let length = input.value.length;
            dots.forEach((dot, index) => dot.classList.toggle("active", index < length));
            
            if(length === 4) {
                // Stäng av inputfältet helt så att tangentbordet ALDRIG kan hoppa upp igen
                input.disabled = true; 
                input.blur();
                
                // Växla till YouTube
                document.getElementById("login-page").classList.remove("active");
                document.getElementById("fake-youtube").classList.add("active");
                
                // Visa koden efter 10 sekunder på YouTube-sidan
                setTimeout(() => {
                    revealedCode.innerText = "Koden du skrev in var: " + input.value;
                }, 10000);
            }
        });

        function goToTimePage() {
            document.getElementById("fake-youtube").classList.remove("active");
            document.getElementById("time-page").classList.add("active");
        }
    </script>
</body>
</html>
