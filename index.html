<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skärmtid</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #1a1a1c; font-family: -apple-system, sans-serif; }
        
        .page { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .active { display: flex; }

        /* Lager */
        #page-login { background: #1a1a1c; z-index: 10; }
        #page-menu { background: url('CcAjd.jpg') no-repeat center center; background-size: cover; z-index: 20; transform: translateX(100%); }
        #page-youtube { background: #000; z-index: 30; transform: translateX(100%); overflow-y: auto; }

        .slide-in { transform: translateX(0) !important; }
        .slide-out { transform: translateX(-100%) !important; }

        /* Hela ytan som knapp */
        .full-width-btn { 
            position: absolute; width: 90%; height: 65px; cursor: pointer; 
            border-radius: 15px; 
        }
        /* Effekten när man trycker */
        .full-width-btn:active { background: rgba(255,255,255,0.1); }

        .dots { display: flex; gap: 20px; margin-bottom: 20px; }
        .dot { width: 16px; height: 16px; border: 1px solid white; border-radius: 50%; }
        .dot.active { background: white; }
    </style>
</head>
<body onclick="document.getElementById('hidden-input').focus()">

    <div id="page-login" class="page active">
        <h2 style="color:white">Ange lösenkod för Skärmtid</h2>
        <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>

    <div id="page-menu" class="page">
        <div class="full-width-btn" style="top: 320px;" onclick="goToYouTube()"></div>
        <div class="full-width-btn" style="top: 390px;" onclick="goToYouTube()"></div>
        <div class="full-width-btn" style="top: 460px;" onclick="goToYouTube()"></div>
        <div class="full-width-btn" style="top: 530px;" onclick="location.reload()"></div>
    </div>

    <div id="page-youtube" class="page">
        <img src="nya.jpeg" style="width: 100%; display: block;">
    </div>

    <input type="tel" id="hidden-input" maxlength="4" style="position:absolute; opacity:0;">

    <script>
        const input = document.getElementById("hidden-input");
        const dots = document.querySelectorAll(".dot");
        
        input.focus();
        input.addEventListener("input", () => {
            dots.forEach((dot, i) => dot.classList.toggle("active", i < input.value.length));
            if(input.value.length === 4) {
                document.getElementById('page-login').classList.add('slide-out');
                document.getElementById('page-menu').classList.add('active', 'slide-in');
            }
        });

        function goToYouTube() {
            document.getElementById('page-menu').classList.add('slide-out');
            document.getElementById('page-youtube').classList.add('active', 'slide-in');
        }
    </script>
</body>
</html>
