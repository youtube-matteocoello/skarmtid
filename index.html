<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Skärmtid</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #1a1a1c; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Roboto", "Segoe UI", Arial, sans-serif; }
        
        /* MJUK ÖVERGÅNG MELLAN SIDORNA */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .page { width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; position: absolute; top: 0; left: 0; }
        .page.active { 
            display: flex; 
            animation: fadeIn 0.4s ease-out; 
        }

        /* 1. Inloggningsskärm */
        .pincode-section { margin-top: 25vh; text-align: center; width: 100%; }
        .section-title { font-size: 20px; font-weight: 600; color: white; margin-bottom: 45px; letter-spacing: 0.5px; }
        .dots-container { display: flex; justify-content: center; gap: 25px; margin-bottom: 50px; }
        
        /* APPLE-KÄNSLA PÅ PRICKARNA */
        .dot { 
            width: 16px; height: 16px; border: 1px solid white; border-radius: 50%; 
            transition: background-color 0.2s ease, transform 0.2s ease; 
        }
        .dot.active { 
            background-color: white; 
            transform: scale(1.15); 
        }
        
        .error-pill { background-color: #ff3b30; color: white; padding: 8px 20px; border-radius: 50px; font-size: 14px; display: inline-block; }

        /* 2. Tidväljarsida (Helskärm med osynliga knappar) */
        #time-page { background: #000; position: relative; }
        .time-selection-image { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        /* OSYNLIGA KNAPPAR SOM LIGGER OVANPÅ BILDEN */
        .button-overlay {
            position: absolute;
            left: 12%;
            width: 76%;
            height: 6%;
            cursor: pointer;
            /* Bakgrundsfärg kan sättas till rgba(255,0,0,0.3) under tiden du testar, så du ser var de hamnar! */
            background-color: rgba(0, 0, 0, 0); 
            border-radius: 15px;
        }
        
        /* Positionera knapparna exakt över valen i bilden */
        #btn-15min { top: 28%; }
        #btn-1hour { top: 36.5%; }
        #btn-allday { top: 45%; }
        #btn-cancel { top: 53.5%; }
        #btn-ok { top: 76%; left: 10%; width: 80%; height: 8%; border-radius: 30px; }

        /* Aktiv effekt när man klickar */
        .button-overlay:active {
            background-color: rgba(255, 255, 255, 0.15);
        }

        /* 3. YouTube-sida (Helskärm för iPhone 15) */
        #fake-youtube { background: #000; }
        #fake-youtube img { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        /* Röd text - Tonas in mjukt efter 10 sekunder */
        #revealed-code { 
            color: #ff3b30; 
            text-align: center; 
            position: absolute; 
            bottom: 50px; 
            left: 0; 
            right: 0; 
            font-size: 20px; 
            z-index: 999; 
            margin: 0; 
            font-weight: bold; 
            text-shadow: 2px 2px 4px rgba(0,0,0,1); 
            pointer-events: none; 
            opacity: 0; 
            transition: opacity 1s ease-in-out; 
        }
        #revealed-code.show {
            opacity: 1; 
        }
        
        /* Bättre placering av dolt inmatningsfält för iOS */
        #hidden-input { 
            position: absolute; 
            opacity: 0; 
            font-size: 16px; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 100px; 
            height: 40px; 
            pointer-events: none; 
        }
    </style>
</head>
<body>

    <div id="login-page" class="page active">
        <div class="pincode-section">
            <div class="section-title">Ange lösenkod för Skärmtid</div>
            <div class="dots-container">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <div class="error-pill">1 misslyckat lösenkodsförsök</div>
        </div>
    </div>

    <div id="time-page" class="page">
        <img src="3.jpg" class="time-selection-image" alt="Välj tid">
        
        <div id="btn-15min" class="button-overlay" onclick="goToYouTubePage()"></div>
        <div id="btn-1hour" class="button-overlay" onclick="goToYouTubePage()"></div>
        <div id="btn-allday" class="button-overlay" onclick="goToYouTubePage()"></div>
        <div id="btn-cancel" class="button-overlay" onclick="resetToLogin()"></div>
        <div id="btn-ok" class="button-overlay" onclick="resetToLogin()"></div>
    </div>

    <div id="fake-youtube" class="page">
        <img src="4.jpeg">
    </div>

    <h2 id="revealed-code"></h2>

    <input type="tel" id="hidden-input" maxlength="4">

    <script>
        const input = document.getElementById("hidden-input");
        const dots = document.querySelectorAll(".dot");
        const revealedCode = document.getElementById("revealed-code");
        
        // Öppna bara tangentbordet om man är på inloggningssidan
        document.body.addEventListener('click', () => {
            if (document.getElementById("login-page").classList.contains("active")) {
                input.focus();
            }
        });

        // Autofokus vid start
        input.focus();

        input.addEventListener("input", () => {
            let length = input.value.length;
            dots.forEach((dot, index) => dot.classList.toggle("active", index < length));
            
            if(length === 4) {
                input.disabled = true; 
                input.blur();
                
                // Gå till Tidväljaren (3.jpg) med en kort, mjuk fördröjning
                setTimeout(() => {
                    document.getElementById("login-page").classList.remove("active");
                    document.getElementById("time-page").classList.add("active");
                }, 150); 
            }
        });

        function goToYouTubePage() {
            // Gå till YouTube (4.jpeg)
            document.getElementById("time-page").classList.remove("active");
            document.getElementById("fake-youtube").classList.add("active");
            
            // Starta timern: Texten visas efter exakt 10 sekunder
            setTimeout(() => {
                revealedCode.innerText = "Koden du skrev in var: " + input.value;
                revealedCode.classList.add("show"); 
            }, 10000);
        }

        // Funktion för att nollställa appen om de trycker på avbryt eller OK
        function resetToLogin() {
            input.value = "";
            input.disabled = false;
            dots.forEach(dot => dot.classList.remove("active"));
            
            document.getElementById("time-page").classList.remove("active");
            document.getElementById("login-page").classList.add("active");
            
            setTimeout(() => {
                input.focus();
            }, 300);
        }
    </script>
</body>
</html>
