<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skärmtid</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #1a1a1c; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden;
        }
        .page { 
            width: 100%; 
            max-width: 450px; 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100%; 
            color: white;
        }
        
        /* 1. Lösenordssidan */
        #page-login { display: flex; }
        .dot-container { display: flex; gap: 20px; margin: 20px 0; justify-content: center; }
        .dot { width: 16px; height: 16px; border: 1px solid white; border-radius: 50%; }
        .dot.active { background: white; }
        .error-pill { background: #ff3b30; padding: 8px 20px; border-radius: 50px; margin-top: 20px; }

        /* 2. Tidsgränssidan (Nu mörk) */
        #page-time-limit { background: #1a1a1c; }
        .time-btn { width: 85%; padding: 15px; margin: 8px; border: none; border-radius: 12px; background: #2c2c2e; color: #007aff; font-size: 17px; cursor: pointer; text-align: center; font-weight: 600; }
        
        /* 3. YouTube */
        #page-youtube { display: none; background: #000; overflow-y: auto; }
        
        #hidden-input { position: absolute; opacity: 0; }
    </style>
</head>
<body onclick="document.getElementById('hidden-input').focus()">

    <div id="page-login" class="page">
        <h2 style="font-size: 20px;">Ange lösenkod för Skärmtid</h2>
        <div class="dot-container">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <div class="error-pill">1 misslyckat lösenkodsförsök</div>
    </div>

    <div id="page-time-limit" class="page">
        <div style="font-size: 50px; margin-bottom: 10px;">⏳</div>
        <h2 style="margin: 5px;">Time Limit</h2>
        <p style="color: #aaa; margin-bottom: 30px;">You've reached your limit on YouTube.</p>
        <button class="time-btn" onclick="showYouTube()">Approve for 15 minutes</button>
        <button class="time-btn" onclick="showYouTube()">Approve for an hour</button>
        <button class="time-btn" onclick="showYouTube()">Approve all day</button>
    </div>

    <div id="page-youtube" class="page">
        <img src="nya.jpeg" style="width: 100%; display: block;">
    </div>

    <input type="tel" id="hidden-input" maxlength="4">

    <script>
        const input = document.getElementById("hidden-input");
        const dots = document.querySelectorAll(".dot");
        
        input.focus();

        input.addEventListener("input", () => {
            dots.forEach((dot, i) => dot.classList.toggle("active", i < input.value.length));
            if(input.value.length === 4) {
                input.blur();
                setTimeout(() => {
                    document.getElementById('page-login').style.display = 'none';
                    document.getElementById('page-time-limit').style.display = 'flex';
                }, 300);
            }
        });

        function showYouTube() {
            document.getElementById('page-time-limit').style.display = 'none';
            document.getElementById('page-youtube').style.display = 'flex';
        }
    </script>
</body>
</html>
