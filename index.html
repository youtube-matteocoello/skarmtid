<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Skärmtid</title>
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif; 
        }
        
        .page { width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; position: absolute; top: 0; left: 0; }
        .page.active { display: flex; }

        /* Bakgrund */
        .bg-image { 
            width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 0; 
            background-image: url('ios2.png'); background-size: cover; background-position: center;
        }

        /* 1. Inloggningsskärm */
        #login-page { background-color: #1a1a1c; z-index: 5; }
        .pincode-section { margin-top: 25vh; text-align: center; width: 100%; }
        .section-title { font-size: 20px; font-weight: 600; color: white; margin-bottom: 45px; }
        .dots-container { display: flex; justify-content: center; gap: 20px; margin-bottom: 50px; }
        .dot { width: 14px; height: 14px; border: 1.5px solid rgba(255,255,255,0.5); border-radius: 50%; }
        .dot.active { background-color: white; border-color: white; }

        /* 2. Tidväljarsida (Den nya designen) */
        #time-page { z-index: 2; }
        
        .modal-container {
            position: absolute;
            bottom: 40px; /* Flyttad till botten för att matcha din nya bild */
            width: 90%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Knapp-stilar för dark mode */
        .action-button {
            width: 100%;
            padding: 18px 0;
            border-radius: 14px;
            border: none;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: opacity 0.2s;
        }

        .ok-btn { background-color: #007AFF; color: white; }
        .request-btn { background-color: rgba(255, 255, 255, 0.1); color: #fff; }
        .action-button:active { opacity: 0.7; }

        /* Meny (om den behövs) */
        .menu-list {
            background: rgba(45, 45, 47, 0.8);
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 12px;
        }
        .menu-item {
            width: 100%; padding: 16px; border: none; background: transparent; 
            color: #fff; border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 16px; text-align: center;
        }

        #hidden-input { position: absolute; opacity: 0; }
    </style>
</head>
<body>

    <div id="login-page" class="page active">
        <div class="bg-image"></div>
        <div class="pincode-section">
            <div class="section-title">Ange lösenkod</div>
            <div class="dots-container">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
        </div>
    </div>

    <div id="time-page" class="page">
        <div class="bg-image"></div>
        <div class="modal-container">
            <div class="menu-list">
                <button class="menu-item" onclick="goToYouTubePage()">Godkänn i 15 minuter</button>
                <button class="menu-item" onclick="goToYouTubePage()">Godkänn i en timme</button>
            </div>
            
            <button class="action-button ok-btn" onclick="goToYouTubePage()">OK</button>
            <button class="action-button request-btn" onclick="resetToLogin()">Be om mer tid</button>
        </div>
    </div>

    <input type="tel" id="hidden-input" maxlength="4">

    <script>
        const input = document.getElementById("hidden-input");
        const dots = document.querySelectorAll(".dot");
        
        document.body.addEventListener('click', () => { if(document.getElementById("login-page").classList.contains("active")) input.focus(); });
        input.focus();

        input.addEventListener("input", () => {
            let len = input.value.length;
            dots.forEach((d, i) => d.classList.toggle("active", i < len));
            if(len === 4) {
                setTimeout(() => {
                    document.getElementById("login-page").classList.remove("active");
                    document.getElementById("time-page").classList.add("active");
                }, 200);
            }
        });

        function goToYouTubePage() { window.location.href = "https://youtube.com"; }
        function resetToLogin() { 
            location.reload(); 
        }
    </script>
</body>
</html>
