<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    
    <title>Skärmtid</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; }
        
        .page { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; transition: transform 0.4s ease-in-out;
        }

        /* Inloggning */
        #page-login { display: flex; flex-direction: column; align-items: center; justify-content: center; background: #1a1a1c; z-index: 10; display: flex; }
        
        /* Kryset uppe i hörnet */
        .x-button { 
            position: absolute; top: 40px; right: 30px; 
            color: white; font-size: 30px; font-weight: bold; 
            cursor: pointer; z-index: 50; padding: 10px;
        }

        .dots { display: flex; gap: 15px; margin-top: 20px; }
        .dot { width: 16px; height: 16px; border: 2px solid white; border-radius: 50%; }
        .dot.active { background: white; }

        /* Meny (Bakgrund + Animering) */
        #page-menu { 
            background: url('bakgrund.jpg') no-repeat center center; 
            background-size: cover; 
            z-index: 20; transform: translateX(100%); 
        }
        #page-menu.active { display: block; }
        #page-menu.slide-in { transform: translateX(0); }

        /* YouTube */
        #page-youtube { background: #000; z-index: 30; transform: translateX(100%); }
        #page-youtube.active { display: block; }
        #page-youtube.slide-in { transform: translateX(0); }
        #page-youtube img { width: 100%; height: 100%; object-fit: contain; display: block; }

        /* Animationer (Slide-out) */
        .slide-out { transform: translateX(-100%) !important; }

        /* Hitboxar */
        .hitbox { 
            position: absolute; left: 10%; width: 80%; height: 60px; 
            cursor: pointer; z-index: 40; 
        }
    </style>
</head>
<body>

    <div id="page-login" class="page active" onclick="document.getElementById('hidden-input').focus()">
        <div class="x-button" onclick="resetLogin(event)">X</div>
        <h2 style="color:white; margin-bottom: 10px;">Ange lösenkod</h2>
        <div class="dots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
    </div>

    <div id="page-menu" class="page">
        <div class="hitbox" style="top: 30%;" onclick="goToYouTube()"></div>
        <div class="hitbox" style="top: 38%;" onclick="goToYouTube()"></div>
        <div class="hitbox" style="top: 46%;" onclick="goToYouTube()"></div>
        <div class="hitbox" style="top: 54%;" onclick="location.reload()"></div>
    </div>

    <div id="page-youtube" class="page">
        <img src="nya.jpeg" alt="YouTube">
    </div>

    <input type="tel" id="hidden-input" maxlength="4" style="position:absolute; opacity:0; pointer-events:none;">

    <script>
        const input = document.getElementById("hidden-input");
        const dots = document.querySelectorAll(".dot");
        input.focus();

        // Nollställ inloggning
        function resetLogin(event) {
            event.stopPropagation(); // Förhindrar att klicket aktiverar inloggnings-fokus
            input.value = '';
            dots.forEach(dot => dot.classList.remove('active'));
        }

        input.addEventListener("input", () => {
            dots.forEach((dot, i) => dot.classList.toggle("active", i < input.value.length));
            
            if(input.value.length === 4) {
                document.getElementById('page-login').classList.add('slide-out');
                document.getElementById('page-menu').classList.add('active', 'slide-in');
            }
        });

        function goToYouTube() {
            document.getElementById('page-menu').classList.add('slide-out');
            document.getElementById('page-youtube').classList.add('active', 'slide-in');
        }
    </script>
</body>
</html>
