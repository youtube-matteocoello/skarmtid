<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Skärmtid</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #1a1a1c; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Roboto", "Segoe UI", Arial, sans-serif; }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .page { width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; position: absolute; top: 0; left: 0; }
        .page.active { 
            display: flex; 
            animation: fadeIn 0.4s ease-out; 
        }

        /* 1. Inloggningsskärm */
        .pincode-section { margin-top: 25vh; text-align: center; width: 100%; }
        .section-title { font-size: 20px; font-weight: 600; color: white; margin-bottom: 45px; letter-spacing: 0.5px; }
        .dots-container { display: flex; justify-content: center; gap: 25px; margin-bottom: 50px; }
        
        .dot { 
            width: 16px; height: 16px; border: 1px solid white; border-radius: 50%; 
            transition: background-color 0.2s ease, transform 0.2s ease;
        }
        .dot.active { 
            background-color: white; 
            transform: scale(1.15); 
        }
        
        .error-pill { background-color: #ff3b30; color: white; padding: 8px 20px; border-radius: 50px; font-size: 14px; display: inline-block; }

        /* 2. Tidväljarsida */
        #time-page { background: #000; position: relative; }
        .time-selection-image { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        /* 💎 PERFEKT KALIBRERAD LIQUID GLASS MENY 💎 */
        .glass-menu {
            position: absolute;
            bottom: 8%; /* Standardhöjd för iOS action-menyer */
            left: 50%;
            transform: translateX(-50%); /* Centrerar menyn perfekt */
            width: 88%;
            display: flex;
            flex-direction: column;
            gap: 2px; /* iOS standardmellanrum för sammansatta knappar */
            z-index: 10;
        }
        
        .glass-btn {
            width: 100%;
            height: 58px; /* Perfekt touch-yta för iPhone */
            border-radius: 14px;
            
            /* Helt osynlig i viloläge så att den inte förstör din bild */
            background: transparent; 
            border: 1px solid transparent; 
            
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            
            /* Mjuk och vätskig övergång vid tryck */
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        
        /* 💧 LIQUID-EFFEKTEN (Bara när man trycker) 💧 */
        .glass-btn:active {
            transform: scale(0.97); /* Krymper minimalt (Apple-känsla) */
            background: rgba(255, 255, 255, 0.15); /* Frostat glas dyker upp */
            border: 1px solid rgba(255, 255, 255, 0.2); 
            backdrop-filter: blur(8px); /* Suddar bilden under fingret */
            -webkit-backdrop-filter: blur(8px);
        }

        /* 3. YouTube-sida */
        #fake-youtube { background: #000; }
        #fake-youtube img { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        /* Röd text */
        #revealed-code { 
            color: #ff3b30; 
            text-align: center; 
            position: absolute; 
            bottom: 50px; 
            left: 0; 
            right: 0; 
            font-size: 20px; 
            z-index: 999; 
            margin: 0; 
            font-weight: bold; 
            text-shadow: 2px 2px 4px rgba(0,0,0,1); 
            pointer-events: none; 
            opacity: 0; 
            transition: opacity 1s ease-in-out; 
        }
        #revealed-code.show {
            opacity: 1; 
        }
        
        /* Gömt inmatningsfält */
        #hidden-input { position: absolute; opacity: 0; font-size: 16px; top: -100px; left: -100px; width: 1px; height: 1px; }
    </style>
</head>
<body>

    <div id="login-page" class="page active">
        <div class="pincode-section">
            <div class="section-title">Ange lösenkod för Skärmtid</div>
            <div class="dots-container">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <div class="error-pill">1 misslyckat lösenkodsförsök</div>
        </div>
    </div>

    <div id="time-page" class="page">
        <img src="3.jpg" class="time-selection-image" alt="Välj tid">
        
        <div class="glass-menu">
            <div class="glass-btn" onclick="goToYouTubePage()"></div>
            <div class="glass-btn" onclick="goToYouTubePage()"></div>
            <div class="glass-btn" onclick="goToYouTubePage()"></div>
            <div class="glass-btn" onclick="goToYouTubePage()"></div>
        </div>
    </div>

    <div id="fake-youtube" class="page">
        <img src="4.jpeg">
    </div>

    <h2 id="revealed-code"></h2>

    <input type="tel" id="hidden-input" maxlength="4">

    <script>
        const input = document.getElementById("hidden-input");
        const dots = document.querySelectorAll(".dot");
        const revealedCode = document.getElementById("revealed-code");
        
        document.body.addEventListener('click', () => {
            if (document.getElementById("login-page").classList.contains("active")) {
                input.focus();
            }
        });

        input.focus();

        input.addEventListener("input", () => {
            let length = input.value.length;
            dots.forEach((dot, index) => dot.classList.toggle("active", index < length));
            
            if(length === 4) {
                input.disabled = true; 
                input.blur();
                
                setTimeout(() => {
                    document.getElementById("login-page").classList.remove("active");
                    document.getElementById("time-page").classList.add("active");
                }, 150); 
            }
        });

        function goToYouTubePage() {
            document.getElementById("time-page").classList.remove("active");
            document.getElementById("fake-youtube").classList.add("active");
            
            setTimeout(() => {
                revealedCode.innerText = "Koden du skrev in var: " + input.value;
                revealedCode.classList.add("show");
            }, 10000);
        }
    </script>
</body>
</html>
