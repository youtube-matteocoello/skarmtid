<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skärmtid</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Roboto", "Segoe UI", Arial, sans-serif; background-color: #1a1a1c; margin: 0; height: 100vh; overflow: hidden; display: flex; justify-content: center; color: white; }
        
        .page { width: 100%; max-width: 450px; height: 100%; display: none; flex-direction: column; align-items: center; position: absolute; }
        .page.active { display: flex; }

        /* Låsskärm */
        .pincode-section { margin-top: 200px; text-align: center; width: 100%; }
        .section-title { font-size: 20px; font-weight: 600; margin-bottom: 45px; }
        .dots-container { display: flex; justify-content: center; gap: 25px; margin-bottom: 50px; }
        .dot { width: 16px; height: 16px; border: 1px solid white; border-radius: 50%; }
        .dot.active { background-color: white; }
        .error-pill { background-color: #ff3b30; padding: 8px 20px; border-radius: 50px; font-size: 14px; }

        /* Tidväljare */
        .time-picker { margin-top: 150px; width: 80%; }
        .time-option { background: #333; padding: 20px; margin: 10px 0; border-radius: 15px; text-align: center; cursor: pointer; font-size: 18px; }

        /* Fake YouTube */
        #fake-youtube { background: #000; overflow-y: auto; }
        #hidden-input { position: absolute; opacity: 0; }
    </style>
</head>
<body onclick="document.getElementById('hidden-input').focus()">

    <div id="login-page" class="page active">
        <div class="pincode-section">
            <div class="section-title">Ange lösenkod för Skärmtid</div>
            <div class="dots-container">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <div class="error-pill">1 misslyckat lösenkodsförsök</div>
        </div>
    </div>

    <div id="time-page" class="page">
        <div class="time-picker">
            <h2 style="text-align:center; margin-bottom:30px;">Välj tillåten tid</h2>
            <div class="time-option" onclick="goToYoutube()">15 minuter</div>
            <div class="time-option" onclick="goToYoutube()">1 timme</div>
            <div class="time-option" onclick="goToYoutube()">Hela dagen</div>
        </div>
    </div>

    <div id="fake-youtube" class="page">
        <img src="unnamed.jpg" style="width: 100%; display: block;">
    </div>

    <input type="tel" id="hidden-input" maxlength="4">

    <script>
        const input = document.getElementById("hidden-input");
        const dots = document.querySelectorAll(".dot");
        
        input.focus();

        input.addEventListener("input", () => {
            let length = input.value.length;
            dots.forEach((dot, index) => dot.classList.toggle("active", index < length));
            if(length === 4) {
                document.getElementById("login-page").classList.remove("active");
                document.getElementById("time-page").classList.add("active");
            }
        });

        function goToYoutube() {
            document.getElementById("time-page").classList.remove("active");
            document.getElementById("fake-youtube").classList.add("active");
        }
    </script>
</body>
</html>
