<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Skärmtid</title>
    <style>
        body { margin: 0; background: #1a1a1c; font-family: -apple-system, sans-serif; overflow: hidden; }
        .page { display: none; position: absolute; width: 100%; height: 100%; align-items: center; justify-content: center; }
        .page.active { display: flex; }

        /* Inloggning */
        .login-box { text-align: center; color: white; }
        .dots { display: flex; gap: 20px; margin-top: 20px; }
        .dot { width: 16px; height: 16px; border: 1px solid white; border-radius: 50%; }
        .dot.active { background: white; }

        /* Menyn - iOS 26 Dark Mode */
        .menu-container {
            width: 85%;
            background: rgba(28, 28, 30, 0.85);
            backdrop-filter: blur(60px);
            -webkit-backdrop-filter: blur(60px);
            border-radius: 24px;
            padding: 10px;
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            display: flex; flex-direction: column; gap: 5px;
        }
        .btn {
            width: 100%; height: 60px;
            background: rgba(255, 255, 255, 0.05);
            border: none; border-radius: 18px;
            color: white; font-size: 18px;
            transition: background 0.2s;
        }
        .btn.active { background: rgba(255, 255, 255, 0.15); }

        #hidden-input { position: absolute; opacity: 0; }
    </style>
</head>
<body>

    <div id="login-page" class="page active">
        <div class="login-box">
            <div>Ange lösenkod</div>
            <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        </div>
    </div>

    <div id="time-page" class="page">
        <div class="menu-container" id="menu">
            <button class="btn">15 minuter</button>
            <button class="btn">En timme</button>
            <button class="btn">Avbryt</button>
        </div>
    </div>

    <input type="tel" id="hidden-input" maxlength="4">

    <script>
        const input = document.getElementById("hidden-input");
        const dots = document.querySelectorAll(".dot");
        const menu = document.getElementById('menu');
        const btns = document.querySelectorAll('.btn');

        // Fokus-logik
        document.body.onclick = () => input.focus();
        input.oninput = () => {
            dots.forEach((d, i) => d.classList.toggle("active", i < input.value.length));
            if(input.value.length === 4) document.getElementById('login-page').className = 'page';
            if(input.value.length === 4) document.getElementById('time-page').className = 'page active';
        };

        // Enkel och stabil meny-logik
        menu.ontouchmove = (e) => {
            const touch = e.touches[0];
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            btns.forEach(b => b.classList.toggle('active', b === target));
        };
        menu.ontouchend = (e) => {
            btns.forEach(b => b.classList.remove('active'));
            const target = document.elementFromPoint(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
            if(target.innerText === "Avbryt") location.reload();
            else alert("Tid vald!");
        };
    </script>
</body>
</html>
