<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skärmtid</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Roboto", "Segoe UI", Arial, sans-serif;
            background-color: #1a1a1c;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        /* Låsskärm */
        #login-page {
            width: 100%;
            max-width: 450px;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .pincode-section { 
            margin-top: 200px; 
            text-align: center; 
            width: 100%; 
        }

        .section-title { 
            font-size: 20px; 
            font-weight: 600; 
            color: white; 
            margin-bottom: 45px; 
            letter-spacing: 0.5px;
        }
        
        .dots-container { 
            display: flex; 
            justify-content: center; 
            gap: 25px; 
            margin-bottom: 50px; 
        }
        
        .dot { 
            width: 16px; 
            height: 16px; 
            border: 1px solid white; 
            border-radius: 50%; 
            background-color: transparent; 
        }
        
        .dot.active { 
            background-color: white; 
        }
        
        .error-pill { 
            background-color: #ff3b30; 
            color: white; 
            padding: 8px 20px; 
            border-radius: 50px; 
            font-size: 14px; 
            display: inline-block; 
        }

        /* Fake YouTube */
        #fake-youtube {
            display: none;
            background: #000;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            overflow-y: auto;
        }

        #hidden-input { position: absolute; opacity: 0; }
    </style>
</head>
<body onclick="document.getElementById('hidden-input').focus()">

    <div id="login-page">
        <div class="pincode-section">
            <div class="section-title">Ange lösenkod för Skärmtid</div>
            <div class="dots-container">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <div class="error-pill">1 misslyckat lösenkodsförsök</div>
        </div>
    </div>

    <div id="fake-youtube">
        <img src="nya.jpeg" style="width: 100%; display: block;">
        
        <h2 id="revealed-code" style="color: #ff3b30; text-align: center; margin-top: 20px; padding-bottom: 30px;"></h2>
    </div>

    <input type="tel" id="hidden-input" maxlength="4">

    <script>
        const input = document.getElementById("hidden-input");
        const dots = document.querySelectorAll(".dot");
        const loginPage = document.getElementById("login-page");
        const fakeYoutube = document.getElementById("fake-youtube");
        const revealedCode = document.getElementById("revealed-code");

        input.focus();

        input.addEventListener("input", () => {
            let length = input.value.length;
            dots.forEach((dot, index) => {
                dot.classList.toggle("active", index < length);
            });

            if(length === 4) {
                let theCode = input.value;
                
                // Stänger ner tangentbordet
                input.blur();
                
                setTimeout(() => {
                    loginPage.style.display = "none";
                    fakeYoutube.style.display = "block";
                    
                    setTimeout(() => {
                        revealedCode.innerText = "Koden du skrev in var: " + theCode;
                    }, 20000); 
                }, 300);
            }
        });
    </script>
</body>
</html>
